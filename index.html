<head>

<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{
    width:100%;height:100%;
    height:100dvh;
    background:#040a14;
    overflow:hidden;
    touch-action:none;
    -webkit-user-select:none;user-select:none;
    font-family:'Segoe UI','Hiragino Sans','Yu Gothic UI',sans-serif;
  }
  body{display:flex;justify-content:center;align-items:center}
  #wrap{
    position:relative;
    width:100vw;height:100vh;height:100dvh;
    overflow:hidden;
    box-shadow:0 0 60px rgba(40,140,220,0.12),0 0 120px rgba(20,60,140,0.08);
  }
  @media (orientation:portrait) and (max-width:500px){
    #wrap{max-width:430px;max-height:932px}
  }
  canvas{display:block;width:100%;height:100%}
  #ui{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between}
  #topBar{
    padding:max(env(safe-area-inset-top,14px),14px) 14px 0;
    padding-top:max(env(safe-area-inset-top,14px),14px);
    display:flex;justify-content:space-between;align-items:flex-start;
    pointer-events:none;
    z-index:10;
  }
  .panel{
    background:rgba(6,16,32,0.65);
    -webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
    border-radius:14px;
    border:1px solid rgba(90,170,255,0.10);
    padding:10px 14px;
    color:rgba(195,225,255,0.88);
    font-size:13px;line-height:1.7;
    pointer-events:auto;
  }
  .panel .lb{color:rgba(130,180,225,0.55);font-size:10px;letter-spacing:0.03em}
  .panel .v{font-weight:600}
  #shrimpInfo{text-align:right}
  .wbar{width:110px;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;margin-top:4px;overflow:hidden}
  .wbar-fill{width:100%;height:100%;background:linear-gradient(90deg,#2e9cc8,#6ec4e8);border-radius:3px;transition:width .8s ease}
  .stat-row{display:flex;align-items:center;gap:4px;margin-top:2px}
  .stat-lb{font-size:9px;color:rgba(130,180,225,0.4);width:14px;text-align:right}
  .minibar{width:46px;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
  .minibar-fill{height:100%;border-radius:2px;transition:width .6s ease}
  #bottomWrap{
    display:flex;flex-direction:column;align-items:center;
    pointer-events:none;z-index:10;
  }
  #toggleBarBtn{
    pointer-events:auto;cursor:pointer;
    background:rgba(6,16,32,0.55);
    -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
    border:1px solid rgba(90,170,255,0.10);
    border-radius:10px 10px 0 0;
    padding:3px 18px 1px;
    color:rgba(195,225,255,0.7);font-size:16px;
    transition:all .25s ease;
    -webkit-tap-highlight-color:transparent;
    margin-bottom:-1px;
  }
  #toggleBarBtn:active{background:rgba(20,50,90,0.5)}
  #bottomBar{
    padding:0 10px calc(max(env(safe-area-inset-bottom,16px),16px) + 8px);
    padding-bottom:calc(max(env(safe-area-inset-bottom,16px),16px) + 8px);
    display:flex;gap:7px;justify-content:center;flex-wrap:wrap;
    pointer-events:auto;
    z-index:10;
    max-height:200px;overflow:hidden;
    transition:max-height .35s ease,opacity .3s ease,padding .35s ease;
  }
  #bottomBar.hidden{
    max-height:0;opacity:0;padding-top:0;padding-bottom:0;
    pointer-events:none;
  }
  .btn{
    background:rgba(6,16,32,0.65);
    -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
    border:1px solid rgba(90,170,255,0.12);
    border-radius:12px;
    padding:12px 20px;
    color:rgba(195,225,255,0.92);
    font-size:14px;
    cursor:pointer;
    transition:all .25s ease;
    display:flex;align-items:center;gap:6px;
    -webkit-tap-highlight-color:transparent;
  }
  .btn:active{background:rgba(20,50,90,0.6);transform:scale(0.96)}
  .btn .ic{font-size:17px}
  #notif{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    background:rgba(6,16,32,0.65);
    -webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
    border-radius:14px;border:1px solid rgba(90,170,255,0.08);
    padding:12px 20px;color:rgba(205,230,255,0.9);font-size:13px;
    opacity:0;transition:opacity .8s ease;pointer-events:none;text-align:center;
    max-width:80%;
  }
  #notif.show{opacity:1}
  .sub-info{
    color:rgba(170,210,240,0.55);
    font-size:10px;letter-spacing:0.02em;
    margin-top:5px;
    padding:0 2px;
  }
  @media (min-width:900px){
    .panel{padding:12px 18px;font-size:14px;border-radius:16px}
    .panel .lb{font-size:11px}
    .wbar{width:140px;height:7px}
    .stat-lb{font-size:10px;width:16px}
    .minibar{width:56px;height:5px}
    .btn{padding:14px 24px;font-size:15px;border-radius:14px}
    .btn .ic{font-size:18px}
    .sub-info{font-size:11px}
    #notif{font-size:15px;padding:14px 24px}
  }
</style>

<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="ui">
    <div id="topBar">
      <div>
        <div class="panel">
          <div><span class="lb">水質</span></div>
          <div class="wbar"><div class="wbar-fill" id="wBar"></div></div>
          <div style="margin-top:4px"><span class="lb">水温</span> <span class="v" id="tempVal">25℃</span></div>
          <div class="wbar"><div class="wbar-fill" id="tempBar" style="width:50%"></div></div>
        </div>

      </div>
      <div>
        <div class="panel" id="shrimpInfo"></div>

      </div>
    </div>
    <div id="bottomWrap">
      <div id="toggleBarBtn">▲ メニュー</div>
      <div id="bottomBar">
        <button class="btn" id="feedBtn"><span class="ic">🍤</span>餌</button>
        <button class="btn" id="feedSelBtn"><span class="ic">🥬</span>野菜</button>
        <button class="btn" id="cleanBtn"><span class="ic">💧</span>水換え</button>
        <button class="btn" id="heaterBtn"><span class="ic">🌡️</span><span id="heaterLbl">ヒーター</span></button>
        <button class="btn" id="filterBtn"><span class="ic">⚙️</span><span id="filterLbl">ろ過OFF</span></button>
        <button class="btn" id="lightBtn"><span class="ic">💡</span><span id="lightLbl">照明AUTO</span></button>
        <button class="btn" id="bgmBtn"><span class="ic">🔇</span><span id="bgmLbl">BGM</span></button>
        <button class="btn" id="saveBtn"><span class="ic">💾</span>セーブ</button>
        <button class="btn" id="loadBtn"><span class="ic">📂</span>ロード</button>
      </div>
    </div>
  </div>
  <div id="notif"></div>
</div>

<script>
// ============================================================
//  癒し水槽 ― 海老育成アプリ  (Mobile / Advanced Water)
// ============================================================
const C=document.getElementById('c'),X=C.getContext('2d');
let W=400,H=780,SAND_Y=620;

function resizeCanvas(){
  const wrap=document.getElementById('wrap');
  const ww=wrap.clientWidth,wh=wrap.clientHeight;
  if(ww<=0||wh<=0)return;
  const aspect=ww/wh;
  if(aspect>=1){H=540;W=Math.min(Math.round(H*aspect),960);}
  else if(ww>=500){W=Math.min(ww,768);H=Math.min(Math.round(W/aspect),1100);}
  else{W=400;H=Math.min(Math.round(W/aspect),780);}
  C.width=W;C.height=H;
  SAND_Y=Math.round(H*0.795);
  initTerrain();
}

// JST Clock
function updateClock(){
  const now=new Date();
  const jst=new Date(now.getTime()+(now.getTimezoneOffset()+540)*60000);
  const h=String(jst.getHours()).padStart(2,'0');
  const m=String(jst.getMinutes()).padStart(2,'0');
  const s=String(jst.getSeconds()).padStart(2,'0');
  document.getElementById('jstClock').textContent=h+':'+m+':'+s+' JST';
}
updateClock();
setInterval(updateClock,1000);

let time=0,lt=performance.now();
let wq=100;
let shrimpsReady=false;

// ─── Water Temperature ───
let waterTemp=25; // ideal: 22-26°C
let heaterOn=false;
function getSeasonTemp(){
  const now=new Date();const m=now.getMonth();
  // Seasonal base: Jan=8, Apr=18, Jul=32, Oct=20
  const seasonal=[8,10,14,18,23,28,32,31,27,20,14,10];
  return seasonal[m];
}
let ambientTemp=getSeasonTemp();
setInterval(()=>{ambientTemp=getSeasonTemp();},60000);

// ─── Filter ───
let filterOn=false;

// ─── Lighting ───
let lightMode='auto'; // 'auto','on','off'
let lightOn=true; // current effective state
let lightBrightness=1; // 0(dark)..1(bright), smoothly animated

// ─── Algae ───
let algaeLevel=0; // 0-100

// ─── Disease ───
// tracked per-shrimp: s.sick

// ─── Shelter ───
// Shelter objects reduce stress
const shelters=[];

// ─── Helpers ───
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rand=(a,b)=>a+Math.random()*(b-a);
const randI=(a,b)=>Math.floor(rand(a,b+1));
const hsl=(h,s,l,a)=>a!=null?`hsla(${h},${s}%,${l}%,${a})`:`hsl(${h},${s}%,${l}%)`;

function notify(m,d=2800){
  const e=document.getElementById('notif');
  e.textContent=m;e.classList.add('show');
  setTimeout(()=>e.classList.remove('show'),d);
}

// ============================================================
//  IMPROVED NOISE — proper gradient Perlin 2D
// ============================================================
const _G=[];for(let i=0;i<256;i++){const a=Math.random()*Math.PI*2;_G[i]=[Math.cos(a),Math.sin(a)];}
const _P=[];for(let i=0;i<256;i++)_P[i]=i;
for(let i=255;i>0;i--){const j=Math.floor(Math.random()*(i+1));[_P[i],_P[j]]=[_P[j],_P[i]];}
for(let i=0;i<256;i++)_P[i+256]=_P[i];

function fade(t){return t*t*t*(t*(t*6-15)+10)}
function perlin(x,y){
  const X=Math.floor(x)&255,Y=Math.floor(y)&255;
  const xf=x-Math.floor(x),yf=y-Math.floor(y);
  const u=fade(xf),v=fade(yf);
  const g00=_G[_P[_P[X]+Y]&255],g10=_G[_P[_P[X+1]+Y]&255];
  const g01=_G[_P[_P[X]+Y+1]&255],g11=_G[_P[_P[X+1]+Y+1]&255];
  const n00=g00[0]*xf+g00[1]*yf;
  const n10=g10[0]*(xf-1)+g10[1]*yf;
  const n01=g01[0]*xf+g01[1]*(yf-1);
  const n11=g11[0]*(xf-1)+g11[1]*(yf-1);
  return lerp(lerp(n00,n10,u),lerp(n01,n11,u),v);
}
function fbm(x,y,oct){
  let v=0,a=0.5,f=1;
  for(let i=0;i<oct;i++){v+=a*perlin(x*f,y*f);a*=0.5;f*=2;}
  return v;
}

// ============================================================
//  OFFSCREEN CAUSTIC TEXTURE (computed at lower res)
// ============================================================
const caustW=100,caustH=50;
const caustC=document.createElement('canvas');
caustC.width=caustW;caustC.height=caustH;
const caustX=caustC.getContext('2d');

function updateCaustics(t){
  const id=caustX.createImageData(caustW,caustH);
  const d=id.data;
  for(let py=0;py<caustH;py++){
    for(let px=0;px<caustW;px++){
      const fx=px/caustW,fy=py/caustH;
      // Overlapping wave interference → caustic network
      let v=0;
      v+=Math.sin((fx*14+t*0.35)+Math.sin(fy*11+t*0.28)*1.8)*0.5;
      v+=Math.sin((fy*16-t*0.3)+Math.cos(fx*13+t*0.22)*1.5)*0.5;
      v+=Math.sin((fx*9+fy*12)*1.1+t*0.4)*0.35;
      v+=Math.sin(((fx+fy)*18-t*0.25))*0.25;
      v+=perlin(fx*6+t*0.15,fy*5-t*0.12)*0.4;
      // Sharp caustic peaks
      v=Math.pow(Math.max(0,(v+1)*0.5),3)*1.8;
      const bright=Math.min(255,v*65)|0;
      const i=(py*caustW+px)*4;
      d[i]=160+bright*0.35;d[i+1]=220+bright*0.15;d[i+2]=240+bright*0.06;
      d[i+3]=bright;
    }
  }
  caustX.putImageData(id,0,0);
}

// ============================================================
//  BACKGROUND — deep gradient with depth haze
// ============================================================
function drawBG(ctx){
  // Beer-Lambert inspired water absorption (14+ stops)
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0.00,'#c2e8f4');g.addColorStop(0.02,'#a8ddef');
  g.addColorStop(0.05,'#8dd2e8');g.addColorStop(0.10,'#6ec3dc');
  g.addColorStop(0.16,'#52b4d2');g.addColorStop(0.24,'#3ea4c6');
  g.addColorStop(0.33,'#2e92b8');g.addColorStop(0.43,'#2280a8');
  g.addColorStop(0.54,'#196f96');g.addColorStop(0.65,'#125e84');
  g.addColorStop(0.76,'#0d4e70');g.addColorStop(0.87,'#093e5c');
  g.addColorStop(0.95,'#063048');g.addColorStop(1.00,'#042638');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // Warm sunlight pool (upper center, animated)
  ctx.save();ctx.globalCompositeOperation='screen';
  ctx.globalAlpha=0.05+Math.sin(time*0.12)*0.008;
  const lg=ctx.createRadialGradient(W*0.42,-H*0.05,0,W*0.42,H*0.28,W*0.75);
  lg.addColorStop(0,'rgba(255,228,185,1)');lg.addColorStop(0.2,'rgba(225,242,255,0.5)');
  lg.addColorStop(0.55,'rgba(130,205,238,0.12)');lg.addColorStop(1,'rgba(60,140,180,0)');
  ctx.fillStyle=lg;ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;ctx.restore();

  // Volumetric turbidity (2 layers, 8px resolution)
  ctx.save();
  for(let layer=0;layer<2;layer++){
    const sp=(layer+1)*0.01,sc=(layer+1)*0.009,al=0.015-layer*0.004;
    ctx.globalAlpha=al;
    for(let y=0;y<H;y+=8){
      for(let x=0;x<W;x+=8){
        const n=fbm(x*sc+time*sp+layer*50,y*sc*0.6+time*sp*0.4,3);
        if(n>0.05){
          const b=Math.min(1,(n-0.05)*3.5);const dpt=y/H;
          ctx.fillStyle=`rgba(${130+dpt*50|0},${195+dpt*25|0},${235+dpt*10|0},${b})`;
          ctx.fillRect(x,y,7,7);
        }
      }
    }
  }
  ctx.globalAlpha=1;ctx.restore();

  // Warm color temperature near surface
  ctx.save();
  const tg=ctx.createLinearGradient(0,0,0,H*0.35);
  tg.addColorStop(0,'rgba(255,240,210,0.035)');tg.addColorStop(1,'rgba(255,240,210,0)');
  ctx.fillStyle=tg;ctx.fillRect(0,0,W,H*0.35);
  ctx.restore();
}

// ============================================================
//  WATER SURFACE — multi-frequency with specular & refraction
// ============================================================
function drawSurface(ctx,t){
  ctx.save();
  const SY=28; // surface baseline y

  // 1) Animated surface profile (5 wave harmonics)
  function waveY(x){
    return SY
      +Math.sin(x*0.022+t*0.55)*3.5
      +Math.sin(x*0.041+t*0.85)*1.8
      +Math.sin(x*0.073+t*1.3)*0.9
      +Math.sin(x*0.12+t*1.8)*0.4
      +Math.sin(x*0.19+t*2.5)*0.2;
  }

  // 2) Sub-surface color band (Snell's window / total internal reflection zone)
  const subG=ctx.createLinearGradient(0,SY-4,0,SY+30);
  subG.addColorStop(0,'rgba(190,235,255,0.22)');
  subG.addColorStop(0.3,'rgba(150,215,245,0.10)');
  subG.addColorStop(1,'rgba(150,215,245,0)');
  ctx.fillStyle=subG;
  ctx.fillRect(0,SY-4,W,34);

  // 3) Draw surface wave fill (meniscus body)
  for(let pass=0;pass<2;pass++){
    const alpha=pass===0?0.18:0.08;
    const yOff=pass*2;
    ctx.fillStyle=`rgba(200,240,255,${alpha})`;
    ctx.beginPath();ctx.moveTo(0,0);
    for(let x=0;x<=W;x+=1){
      ctx.lineTo(x,waveY(x)+yOff);
    }
    ctx.lineTo(W,0);ctx.closePath();ctx.fill();
  }

  // 4) Surface wave strokes (softer, more natural)
  const layers=[
    {a:0.12,w:1.4,freq:0.022,sp:0.55,amp:3.5},
    {a:0.07,w:0.9,freq:0.041,sp:0.85,amp:1.8},
    {a:0.035,w:0.5,freq:0.073,sp:1.3,amp:0.9},
  ];
  for(const L of layers){
    ctx.strokeStyle=`rgba(215,245,255,${L.a})`;
    ctx.lineWidth=L.w;
    ctx.beginPath();
    for(let x=0;x<=W;x+=1){
      const y=waveY(x);
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
  }

  // 5) Specular highlights on wave crests (soft, warm)
  ctx.globalCompositeOperation='screen';
  for(let x=0;x<W;x+=2){
    const y=waveY(x);
    const slope=(waveY(x+1)-waveY(x-1))*0.5;
    if(slope<-0.2){
      const intensity=Math.min(1,Math.abs(slope)*2.0);
      ctx.globalAlpha=intensity*0.07;
      ctx.fillStyle='#fff8f0';
      ctx.fillRect(x-0.5,y-1,3,2.5);
    }
  }
  ctx.globalAlpha=1;
  ctx.globalCompositeOperation='source-over';

  // 6) Volumetric light shafts (god rays) with proper scattering
  ctx.globalCompositeOperation='screen';
  const rayCount=5;
  for(let i=0;i<rayCount;i++){
    const phase=i*1.618*Math.PI;
    const cx=W*0.12+i*(W*0.8/(rayCount-1))+Math.sin(t*0.12+phase)*18;
    const topW=6+Math.sin(t*0.18+phase)*2;
    const botW=35+Math.sin(t*0.15+phase)*15+i*5;
    const depth=H*0.72+Math.sin(t*0.1+phase)*30;
    const baseA=0.028+Math.sin(t*0.14+phase)*0.012;

    // Multi-stop gradient for scattering falloff
    const rg=ctx.createLinearGradient(cx,SY,cx+botW*0.15,depth);
    rg.addColorStop(0,`rgba(210,240,248,${baseA*3})`);
    rg.addColorStop(0.08,`rgba(170,228,250,${baseA*2})`);
    rg.addColorStop(0.25,`rgba(155,218,245,${baseA*1.3})`);
    rg.addColorStop(0.5,`rgba(140,210,240,${baseA*0.7})`);
    rg.addColorStop(0.8,`rgba(130,200,235,${baseA*0.3})`);
    rg.addColorStop(1,'rgba(130,200,235,0)');
    ctx.fillStyle=rg;

    // Cone shape with wavy edges
    ctx.beginPath();
    ctx.moveTo(cx-topW,SY);ctx.lineTo(cx+topW,SY);
    // Right edge (wavy)
    const steps=20;
    for(let s=1;s<=steps;s++){
      const frac=s/steps;
      const ey=SY+frac*(depth-SY);
      const ex=cx+lerp(topW,botW,frac)+Math.sin(t*0.3+frac*5+phase)*3*frac;
      ctx.lineTo(ex,ey);
    }
    // Left edge (wavy, reversed)
    for(let s=steps;s>=1;s--){
      const frac=s/steps;
      const ey=SY+frac*(depth-SY);
      const ex=cx-lerp(topW,botW*0.65,frac)+Math.sin(t*0.25+frac*4+phase+1)*2.5*frac;
      ctx.lineTo(ex,ey);
    }
    ctx.closePath();ctx.fill();

    // Tyndall scattering (bright core within ray)
    const coreA=baseA*0.6;
    const cg=ctx.createLinearGradient(cx,SY,cx,depth*0.5);
    cg.addColorStop(0,`rgba(210,245,255,${coreA})`);
    cg.addColorStop(1,'rgba(210,245,255,0)');
    ctx.fillStyle=cg;
    ctx.beginPath();
    ctx.moveTo(cx-topW*0.3,SY);ctx.lineTo(cx+topW*0.3,SY);
    ctx.lineTo(cx+botW*0.15,depth*0.45);ctx.lineTo(cx-botW*0.1,depth*0.45);
    ctx.closePath();ctx.fill();
  }
  ctx.globalCompositeOperation='source-over';

  // 7) Surface reflection band (Fresnel)
  const fresnelG=ctx.createLinearGradient(0,SY-6,0,SY+8);
  fresnelG.addColorStop(0,'rgba(220,245,255,0.15)');
  fresnelG.addColorStop(0.4,'rgba(200,240,255,0.06)');
  fresnelG.addColorStop(1,'rgba(200,240,255,0)');
  ctx.fillStyle=fresnelG;
  ctx.beginPath();
  for(let x=0;x<=W;x++){
    const y=waveY(x);
    x===0?ctx.moveTo(x,y-4):ctx.lineTo(x,y-4);
  }
  for(let x=W;x>=0;x--){
    ctx.lineTo(x,waveY(x)+6);
  }
  ctx.closePath();ctx.fill();

  ctx.restore();
}

// ============================================================
//  CAUSTICS — rendered from offscreen texture
// ============================================================
function drawCaustics(ctx,t){
  updateCaustics(t);
  ctx.save();
  ctx.globalCompositeOperation='screen';
  // Strong caustics on sand
  ctx.globalAlpha=0.42;
  ctx.drawImage(caustC,0,0,caustW,caustH, 0,SAND_Y-55,W,H-SAND_Y+55);
  // Medium caustics mid-water
  ctx.globalAlpha=0.12;
  ctx.drawImage(caustC,0,0,caustW,caustH, 0,H*0.38,W,H*0.38);
  // Faint caustics upper water
  ctx.globalAlpha=0.04;
  ctx.drawImage(caustC,0,0,caustW,caustH, 0,H*0.06,W,H*0.35);
  ctx.restore();
}

// ============================================================
//  UNDERWATER HAZE (depth fog)
// ============================================================
function drawHaze(ctx,t){
  ctx.save();
  // Multi-layer depth fog
  const hg=ctx.createLinearGradient(0,H*0.15,0,H);
  hg.addColorStop(0,'rgba(10,40,62,0)');
  hg.addColorStop(0.25,'rgba(12,44,68,0.015)');
  hg.addColorStop(0.5,'rgba(12,42,65,0.04)');
  hg.addColorStop(0.75,'rgba(10,36,56,0.08)');
  hg.addColorStop(1,'rgba(6,28,44,0.16)');
  ctx.fillStyle=hg;
  ctx.fillRect(0,0,W,H);

  // Animated refracted light (main pool)
  ctx.globalCompositeOperation='screen';
  const flickerA=0.02+Math.sin(t*0.8)*0.006+Math.sin(t*1.4)*0.004+Math.sin(t*2.3)*0.002;
  ctx.globalAlpha=flickerA;
  const fx=W*0.46+Math.sin(t*0.22)*25+Math.cos(t*0.17)*15;
  const fy=H*0.1+Math.sin(t*0.18)*8;
  const fg=ctx.createRadialGradient(fx,fy,0,fx,H*0.35,H*0.52);
  fg.addColorStop(0,'rgba(215,248,255,1)');
  fg.addColorStop(0.15,'rgba(190,238,252,0.7)');
  fg.addColorStop(0.45,'rgba(145,218,242,0.3)');
  fg.addColorStop(1,'rgba(100,190,228,0)');
  ctx.fillStyle=fg;
  ctx.fillRect(0,0,W,H);
  // Secondary scattered light pools
  ctx.globalAlpha=flickerA*0.35;
  for(let i=0;i<3;i++){
    const lx=W*(0.18+i*0.3)+Math.sin(t*0.13+i*2.1)*20;
    const ly=H*(0.25+i*0.08)+Math.cos(t*0.11+i*1.7)*12;
    const lr=H*0.18;
    const lg=ctx.createRadialGradient(lx,ly,0,lx,ly,lr);
    lg.addColorStop(0,'rgba(200,242,255,0.6)');lg.addColorStop(1,'rgba(200,242,255,0)');
    ctx.fillStyle=lg;ctx.fillRect(lx-lr,ly-lr,lr*2,lr*2);
  }
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=1;
  ctx.restore();
}

// ============================================================
//  SAND & SUBSTRATE
// ============================================================
const sandGrains=[],pebbles=[],debris=[],mossPatch=[];

function sandY(x){
  return SAND_Y+Math.sin(x*0.018+0.5)*4+Math.sin(x*0.05+1.2)*2+Math.sin(x*0.1)*0.8
    +perlin(x*0.008,3.7)*6;
}

function drawSand(ctx,t){
  // === BASE SAND with Perlin micro-texture ===
  // Main fill
  const g=ctx.createLinearGradient(0,SAND_Y-10,0,H);
  g.addColorStop(0.00,'#ece3d3');g.addColorStop(0.02,'#e8dfc9');
  g.addColorStop(0.06,'#e3d9c2');g.addColorStop(0.12,'#ded3ba');
  g.addColorStop(0.22,'#d8ccb2');g.addColorStop(0.35,'#d2c6aa');
  g.addColorStop(0.50,'#ccc0a2');g.addColorStop(0.65,'#c6ba9a');
  g.addColorStop(0.82,'#c0b492');g.addColorStop(1.00,'#b8ac88');
  ctx.fillStyle=g;
  ctx.beginPath();ctx.moveTo(0,H);
  for(let x=0;x<=W;x++)ctx.lineTo(x,sandY(x));
  ctx.lineTo(W,H);ctx.closePath();ctx.fill();

  // Perlin sand noise texture (pixel-level detail)
  ctx.save();
  const sandTop=SAND_Y-10,sandH=H-sandTop;
  for(let py=0;py<sandH;py+=3){
    for(let px=0;px<W;px+=3){
      const ry=sandTop+py;
      if(ry<sandY(px)-1)continue;
      const n=perlin(px*0.04+17,ry*0.04+23);
      const n2=perlin(px*0.12+50,ry*0.12+80);
      const bright=n*18+n2*8;
      if(Math.abs(bright)>3){
        ctx.globalAlpha=Math.min(0.08,Math.abs(bright)*0.004);
        ctx.fillStyle=bright>0?'rgba(255,248,230,1)':'rgba(120,100,70,1)';
        ctx.fillRect(px,ry,3,3);
      }
    }
  }
  ctx.globalAlpha=1;ctx.restore();

  // Wet darkening at waterline
  const wg=ctx.createLinearGradient(0,SAND_Y-6,0,SAND_Y+25);
  wg.addColorStop(0,'rgba(80,65,40,0.25)');wg.addColorStop(0.15,'rgba(95,80,55,0.18)');
  wg.addColorStop(0.4,'rgba(110,95,70,0.08)');wg.addColorStop(1,'rgba(120,105,80,0)');
  ctx.fillStyle=wg;
  ctx.beginPath();ctx.moveTo(0,H);
  for(let x=0;x<=W;x++)ctx.lineTo(x,sandY(x));
  ctx.lineTo(W,H);ctx.closePath();ctx.fill();

  // Subtle layered strata
  for(let layer=0;layer<3;layer++){
    const yOff=12+layer*10;
    ctx.fillStyle=`rgba(${155-layer*12},${145-layer*10},${125-layer*8},${(0.06+layer*0.02).toFixed(3)})`;
    ctx.beginPath();ctx.moveTo(0,H);
    for(let x=0;x<=W;x++){
      ctx.lineTo(x,SAND_Y+yOff+Math.sin(x*0.02+layer*1.5+0.8)*2.5
        +Math.sin(x*0.065+layer*2.1)*1.2+perlin(x*0.006+layer*10,1.2)*4);
    }
    ctx.lineTo(W,H);ctx.closePath();ctx.fill();
  }

  // === SAND GRAINS (multi-size, warm tones) ===
  for(const g2 of sandGrains){
    ctx.globalAlpha=g2.a;
    ctx.fillStyle=g2.color;
    ctx.beginPath();ctx.arc(g2.x,g2.y,g2.r,0,Math.PI*2);ctx.fill();
    // Tiny highlight on larger grains
    if(g2.r>1.2){ctx.globalAlpha=g2.a*0.5;ctx.fillStyle='rgba(255,250,235,0.4)';
      ctx.beginPath();ctx.arc(g2.x-g2.r*0.2,g2.y-g2.r*0.2,g2.r*0.3,0,Math.PI*2);ctx.fill();}
  }
  ctx.globalAlpha=1;

  // === MOSS / BIOFILM PATCHES ===
  for(const mp of mossPatch){
    ctx.save();ctx.globalAlpha=mp.a;
    const mg=ctx.createRadialGradient(mp.x,mp.y,0,mp.x,mp.y,mp.r);
    mg.addColorStop(0,`hsla(${mp.hue},${mp.sat}%,${mp.lit}%,0.45)`);
    mg.addColorStop(0.6,`hsla(${mp.hue},${mp.sat}%,${mp.lit+8}%,0.2)`);
    mg.addColorStop(1,`hsla(${mp.hue},${mp.sat}%,${mp.lit}%,0)`);
    ctx.fillStyle=mg;ctx.beginPath();ctx.arc(mp.x,mp.y,mp.r,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // === DEBRIS (fallen leaves, organic bits) ===
  for(const d of debris){
    ctx.save();ctx.translate(d.x,d.y);ctx.rotate(d.rot);
    ctx.globalAlpha=d.a;
    ctx.fillStyle=d.color;
    ctx.beginPath();ctx.ellipse(0,0,d.w,d.h,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // === PEBBLES & STONES (various sizes, realistic shading) ===
  for(const p of pebbles){
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    // Shadow (larger, softer)
    ctx.fillStyle=`rgba(0,0,0,${(p.shadow).toFixed(3)})`;ctx.beginPath();
    ctx.ellipse(p.rx*0.15,p.ry*0.25,p.rx+1.2,p.ry+0.5,0,0,Math.PI*2);ctx.fill();
    // Base body with noise-like color variation
    const pg=ctx.createRadialGradient(-p.rx*0.25,-p.ry*0.3,0,p.rx*0.1,p.ry*0.1,Math.max(p.rx,p.ry)*1.1);
    pg.addColorStop(0,p.cLight);pg.addColorStop(0.55,p.cMid);pg.addColorStop(1,p.cDark);
    ctx.fillStyle=pg;ctx.beginPath();ctx.ellipse(0,0,p.rx,p.ry,0,0,Math.PI*2);ctx.fill();
    // Surface texture (tiny specks)
    ctx.globalAlpha=0.06;
    for(let k=0;k<p.specks;k++){
      const sx=rand(-p.rx*0.7,p.rx*0.7),sy=rand(-p.ry*0.7,p.ry*0.7);
      ctx.fillStyle=Math.random()>0.5?'rgba(255,255,255,1)':'rgba(0,0,0,1)';
      ctx.fillRect(sx,sy,0.8,0.8);
    }
    ctx.globalAlpha=1;
    // Specular highlight (top-left, warm)
    ctx.fillStyle=`rgba(255,252,240,${(p.hl).toFixed(3)})`;
    ctx.beginPath();ctx.ellipse(-p.rx*0.28,-p.ry*0.32,p.rx*0.38,p.ry*0.28,0.25,0,Math.PI*2);ctx.fill();
    // Rim light (subtle)
    ctx.strokeStyle=`rgba(255,248,230,${(p.hl*0.3).toFixed(3)})`;ctx.lineWidth=0.3;
    ctx.beginPath();ctx.arc(0,-p.ry*0.15,Math.max(p.rx,p.ry)*0.7,-0.8,-2.3,true);ctx.stroke();
    ctx.restore();
  }

  // === ANIMATED CURRENT RIPPLES (flowing sand lines) ===
  ctx.save();
  for(let i=0;i<10;i++){
    const yBase=SAND_Y+5+i*4;
    const al=(0.015+i*0.003+(Math.sin(t*0.06+i)*0.004)).toFixed(4);
    ctx.strokeStyle=`rgba(160,148,125,${al})`;ctx.lineWidth=0.5;
    ctx.beginPath();
    for(let x=0;x<=W;x+=2){
      ctx.lineTo(x,yBase+Math.sin(x*0.035+i*0.7+t*0.04)*1.2
        +Math.sin(x*0.075+i*1.2+t*0.02)*0.5
        +perlin(x*0.01+i*3+t*0.008,yBase*0.02)*1.5);
    }
    ctx.stroke();
  }
  ctx.restore();

  // === BUBBLE DIMPLES on sand ===
  ctx.save();ctx.globalAlpha=0.03;
  for(let i=0;i<6;i++){
    const bx=sandGrains.length>i*30?sandGrains[i*30].x:W*0.2+i*W*0.12;
    const by=sandY(bx)+2+i*0.8;
    ctx.strokeStyle='rgba(100,85,60,1)';ctx.lineWidth=0.4;
    ctx.beginPath();ctx.arc(bx,by,rand(2,5),0.3,Math.PI-0.3);ctx.stroke();
  }
  ctx.globalAlpha=1;ctx.restore();
}

// ============================================================
//  WATER PLANTS
// ============================================================
class WaterPlant{
  constructor(x,y,type,n,depth){
    this.x=x;this.y=y;this.type=type;this.depth=depth||0;this.blades=[];
    for(let i=0;i<n;i++){
      this.blades.push({
        ang:rand(-0.35,0.35),len:type==='moss'?rand(14,42):rand(35,75),
        w:type==='moss'?rand(1.2,3.5):rand(2,5),
        ph:rand(0,Math.PI*2),sp:rand(0.2,0.5),
        hue:type==='moss'?randI(115,148):randI(100,135),sat:randI(40,70),lit:randI(28,50),
        ox:rand(-12,12),tc:rand(0.1,0.4)*(Math.random()<0.5?1:-1),
        seg:type==='stem'?randI(3,5):1,
      });
    }
  }
  draw(ctx,t){
    const _dsc=lerp(1,0.65,this.depth),_dA=lerp(1,0.45,this.depth);
    for(const b of this.blades){
      const sw=Math.sin(t*b.sp+b.ph)*0.06+Math.sin(t*b.sp*1.7+b.ph+1)*0.03;
      ctx.save();ctx.translate(this.x+b.ox,this.y);ctx.scale(_dsc,_dsc);ctx.globalAlpha=_dA;ctx.rotate(b.ang+sw);
      if(this.type==='moss'){
        const g=ctx.createLinearGradient(0,0,0,-b.len);
        g.addColorStop(0,hsl(b.hue,b.sat,b.lit+5,0.88));
        g.addColorStop(0.7,hsl(b.hue+5,b.sat+5,b.lit+10,0.82));
        g.addColorStop(1,hsl(b.hue+8,b.sat,b.lit+15,0.65));
        ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(0,0);
        ctx.bezierCurveTo(-b.w,-b.len*0.3,-b.w*0.8+b.tc*5,-b.len*0.7,b.tc*3,-b.len);
        ctx.bezierCurveTo(b.w*0.8+b.tc*5,-b.len*0.7,b.w,-b.len*0.3,0,0);
        ctx.fill();
        ctx.strokeStyle=hsl(b.hue-5,b.sat-10,b.lit-5,0.12);ctx.lineWidth=0.4;
        ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(b.tc*2,-b.len*0.5,b.tc*3,-b.len);ctx.stroke();
      }else{
        ctx.strokeStyle=hsl(b.hue,b.sat,b.lit,0.78);ctx.lineWidth=b.w*0.35;
        let cx2=0,cy2=0;const sh=b.len/b.seg;
        for(let s=0;s<b.seg;s++){
          const nx=cx2+rand(-2.5,2.5)+b.tc*1.5,ny=cy2-sh;
          ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.lineTo(nx,ny);ctx.stroke();
          if(s>0){
            const ll=rand(6,14),ld=s%2===0?1:-1,ls=Math.sin(t*b.sp*0.8+s)*0.1;
            ctx.save();ctx.translate(cx2,cy2);ctx.rotate(ld*0.8+ls);
            const lg=ctx.createLinearGradient(0,0,ll,0);
            lg.addColorStop(0,hsl(b.hue,b.sat,b.lit,0.78));lg.addColorStop(1,hsl(b.hue+10,b.sat,b.lit+15,0.45));
            ctx.fillStyle=lg;ctx.beginPath();ctx.ellipse(ll/2,0,ll/2,2.5,0,0,Math.PI*2);ctx.fill();
            ctx.restore();
          }
          cx2=nx;cy2=ny;
        }
      }
      ctx.restore();
    }
  }
}

const plants=[];
const plantDefs=[
  {xr:0.06,t:'moss',n:18,d:0.15},{xr:0.19,t:'stem',n:5,d:0.7},
  {xr:0.30,t:'moss',n:14,d:0.35},{xr:0.44,t:'moss',n:16,d:0.8},
  {xr:0.54,t:'stem',n:6,d:0.1},{xr:0.65,t:'moss',n:18,d:0.5},
  {xr:0.78,t:'stem',n:4,d:0.85},{xr:0.88,t:'moss',n:12,d:0.25},
  {xr:0.96,t:'moss',n:8,d:0.6},{xr:0.13,t:'moss',n:6,d:0.12},
  {xr:0.73,t:'moss',n:5,d:0.45},{xr:0.38,t:'moss',n:5,d:0.72},
];

// ============================================================
//  FLOATING PARTICLES
// ============================================================
const parts=[];

function initTerrain(){
  sandGrains.length=0;
  const sandN=Math.round(350*(W/400));
  for(let i=0;i<sandN;i++){
    const sx=rand(0,W),sy=rand(SAND_Y-2,H);
    const tone=randI(0,3); // 0=white, 1=golden, 2=brown, 3=dark
    const colors=['rgba(245,238,220','rgba(220,195,150','rgba(185,168,135','rgba(155,140,115'];
    sandGrains.push({x:sx,y:sy,r:rand(0.3,tone<2?1.8:2.5),
      color:colors[tone]+`,1)`,a:rand(0.04,0.18)});
  }

  pebbles.length=0;
  const pebN=Math.round(14*(W/400));
  const pebTypes=['sandstone','granite','slate','river'];
  for(let i=0;i<pebN;i++){
    const t=pebTypes[randI(0,3)];
    let cL,cM,cD;
    if(t==='sandstone'){cL='rgba(235,225,205,0.8)';cM='rgba(210,195,170,0.7)';cD='rgba(180,165,140,0.55)';}
    else if(t==='granite'){cL='rgba(200,200,200,0.7)';cM='rgba(160,160,155,0.6)';cD='rgba(120,118,115,0.5)';}
    else if(t==='slate'){cL='rgba(175,180,175,0.65)';cM='rgba(135,140,138,0.55)';cD='rgba(95,100,98,0.5)';}
    else{cL='rgba(215,210,195,0.75)';cM='rgba(185,178,162,0.65)';cD='rgba(148,142,128,0.55)';}
    const rx=rand(2.5,9),ry=rand(1.5,rx*0.7);
    pebbles.push({x:rand(15,W-15),y:rand(SAND_Y+2,SAND_Y+35),rx,ry,
      rot:rand(-0.4,0.4),cLight:cL,cMid:cM,cDark:cD,
      hl:rand(0.05,0.18),shadow:rand(0.04,0.10),specks:Math.round(rx*ry*0.4),type:t});
  }

  // Moss patches (biofilm on stones/sand)
  mossPatch.length=0;
  const mossN=Math.round(6*(W/400));
  for(let i=0;i<mossN;i++){
    mossPatch.push({x:rand(15,W-15),y:rand(SAND_Y+5,SAND_Y+40),
      r:rand(6,18),hue:randI(90,150),sat:randI(25,55),lit:randI(25,45),a:rand(0.08,0.22)});
  }

  // Organic debris (tiny fallen leaf bits, detritus)
  debris.length=0;
  const debN=Math.round(12*(W/400));
  for(let i=0;i<debN;i++){
    const dh=randI(0,2); // 0=brown, 1=dark green, 2=tan
    const dColors=['rgba(130,100,55,0.18)','rgba(65,85,50,0.15)','rgba(175,155,115,0.12)'];
    debris.push({x:rand(10,W-10),y:rand(SAND_Y+1,SAND_Y+28),
      w:rand(1.5,4.5),h:rand(0.6,1.8),rot:rand(0,Math.PI*2),color:dColors[dh],a:rand(0.1,0.25)});
  }

  plants.length=0;
  for(const p of plantDefs){
    plants.push(new WaterPlant(p.xr*W,SAND_Y+rand(-2,5),p.t,p.n,p.d));
  }
  plants.sort((a,b)=>b.depth-a.depth);
  parts.length=0;
  const partN=Math.round(40*(W/400));
  for(let i=0;i<partN;i++){
    parts.push({x:rand(0,W),y:rand(50,SAND_Y-20),vx:rand(-1.5,1.5),vy:rand(-0.8,0.8),
      r:rand(0.3,1.3),alpha:rand(0.03,0.12),ph:rand(0,Math.PI*2),depth:rand(0,1)});
  }
  if(shrimpsReady){for(const s of shrimps){s.x=clamp(s.x,20,W-20);s.y=clamp(s.y,60,SAND_Y+2);}}
}
resizeCanvas();
let _resizeTimer=0;
window.addEventListener('resize',()=>{
  clearTimeout(_resizeTimer);
  _resizeTimer=setTimeout(resizeCanvas,150);
});

function updateParts(dt){
  for(const p of parts){
    p.x+=p.vx*dt+Math.sin(time*0.5+p.ph)*0.25*dt;
    p.y+=p.vy*dt+Math.cos(time*0.4+p.ph)*0.15*dt;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;
    if(p.y<40)p.y=SAND_Y-30;if(p.y>SAND_Y-10)p.y=40;
  }
}
function drawParts(ctx){
  for(const p of parts){
    const ds=lerp(1,0.4,p.depth);
    const r=p.r*ds;
    const al=p.alpha*lerp(1,0.35,p.depth);
    // Bokeh soft circle
    ctx.save();
    ctx.globalAlpha=al*0.4;
    const bg=ctx.createRadialGradient(p.x,p.y,r*0.2,p.x,p.y,r*2.2);
    bg.addColorStop(0,'rgba(220,248,255,0.3)');bg.addColorStop(0.6,'rgba(210,242,252,0.08)');
    bg.addColorStop(1,'rgba(200,238,250,0)');
    ctx.fillStyle=bg;ctx.beginPath();ctx.arc(p.x,p.y,r*2.2,0,Math.PI*2);ctx.fill();
    // Core
    ctx.globalAlpha=al;
    ctx.fillStyle='rgba(230,248,255,1)';ctx.beginPath();ctx.arc(p.x,p.y,r*0.55,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

// ============================================================
//  BUBBLES
// ============================================================
const bubs=[];
function spawnBub(x,y){bubs.push({x:x||rand(30,W-30),y:y||H-rand(15,60),r:rand(0.8,3.8),sp:rand(15,35),wo:rand(0,Math.PI*2),wa:rand(3,10),al:rand(0.1,0.26)});}
setInterval(()=>{if(Math.random()<0.3)spawnBub()},2000);
for(let i=0;i<4;i++)spawnBub(rand(60,W-60),rand(H*0.26,H*0.64));

function drawBubs(ctx,t){
  for(let i=bubs.length-1;i>=0;i--){
    const b=bubs[i];
    b.y-=b.sp/60;b.x+=Math.sin(t*1.2+b.wo)*b.wa/60;
    if(b.y<30){bubs.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=b.al;
    ctx.strokeStyle='rgba(195,238,255,0.45)';ctx.lineWidth=0.6;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.stroke();
    const bg=ctx.createRadialGradient(b.x-b.r*0.25,b.y-b.r*0.25,0,b.x,b.y,b.r);
    bg.addColorStop(0,'rgba(215,248,255,0.1)');bg.addColorStop(1,'rgba(195,238,255,0.01)');
    ctx.fillStyle=bg;ctx.fill();
    ctx.globalAlpha=b.al*1.5;ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.beginPath();ctx.arc(b.x-b.r*0.28,b.y-b.r*0.3,b.r*0.22,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

const foods=[];
class Food{
  constructor(x,type){this.x=x;this.y=35;this.ty=rand(SAND_Y-50,SAND_Y-5);this.sp=rand(10,20);this.sz=rand(1.5,3);
    this.eaten=false;this.sw=rand(0,Math.PI*2);this.alpha=1;this.rot=rand(0,Math.PI*2);
    this.age=0;this.rotting=false;this.type=type||'normal';}
  update(dt){
    if(this.eaten){this.alpha-=dt*2.5;return;}
    if(this.y<this.ty){this.y+=this.sp*dt;this.x+=Math.sin(time*1.2+this.sw)*5*dt;this.rot+=dt*0.7;}
    else{const rotTime=this.type==='veggie'?45:30;this.age+=dt;if(this.age>rotTime&&!this.rotting){this.rotting=true;}}
    if(this.rotting){const rottingSpeed=this.type==='veggie'?0.025:0.04;this.alpha-=dt*rottingSpeed;}
  }
  draw(ctx){
    if(this.alpha<=0)return;
    ctx.save();ctx.globalAlpha=this.alpha;ctx.translate(this.x,this.y);ctx.rotate(this.rot);
    let rc,hi;
    if(this.type==='veggie'){rc=this.rotting?'#6a7a3a':'#5a9a3a';hi=this.rotting?'rgba(100,120,50,0.45)':'rgba(90,170,70,0.45)';}
    else{rc=this.rotting?'#8a7a4a':'#b8884a';hi=this.rotting?'rgba(140,120,70,0.45)':'rgba(200,160,100,0.45)';}
    ctx.fillStyle=rc;ctx.beginPath();ctx.ellipse(0,0,this.sz*1.1,this.sz*0.75,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=hi;ctx.beginPath();ctx.ellipse(-this.sz*0.15,-this.sz*0.15,this.sz*0.35,this.sz*0.25,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  get settled(){return this.y>=this.ty-2}
}

const shells=[];
class MoltedShell{
  constructor(x,y,r){this.x=x;this.y=y;this.alpha=0.55;this.fs=rand(2,5);this.sz=rand(4,7);this.isR=r;this.rot=rand(0,Math.PI*2);this.rs=rand(-0.2,0.2);}
  update(dt){this.y-=this.fs*dt;this.x+=Math.sin(time*0.6+this.rot)*1.5*dt;this.rot+=this.rs*dt;this.alpha-=dt*0.04;}
  draw(ctx){
    if(this.alpha<=0)return;
    ctx.save();ctx.globalAlpha=this.alpha*0.45;ctx.translate(this.x,this.y);ctx.rotate(this.rot);
    ctx.fillStyle=this.isR?'rgba(195,155,145,0.35)':'rgba(215,225,220,0.25)';
    ctx.beginPath();ctx.ellipse(0,0,this.sz,this.sz*0.35,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=0.4;ctx.stroke();
    ctx.restore();
  }
}

// ============================================================
//  SHRIMP BASE
// ============================================================
const ST={TSUMA:0,WALK:1,IDLE:2,SWIM:3,EAT:4,FOLLOW:5,FLOAT:6};
const SNB=['ツマツマ中','歩き中','休憩中','スイム！','お食事中','','ふわふわ'];
const SNC=['ツマツマ中','歩き中','水草の影','スイム','お食事中','ついていく','ふわふわ'];

class Shrimp{
  constructor(x,y){
    this.x=x;this.y=y;this.tx=x;this.ty=y;
    this.depth=0;this.baseDepth=0;this.uiId=null;
    this.state=ST.TSUMA;this.st=0;this.sd=rand(3,8);
    this.facing=1;this.lp=0;this.bw=0;
    this.tr=0;this.mt=rand(60,120);
    this.speed=18;this.ap=rand(0,Math.PI*2);
    this.tp=0;this.jm=false;
    this.sb=0;this.bp=rand(0,Math.PI*2);
    this.hunger=100;this.hp=100;
    this.alive=true;this.dying=false;this.dyingTimer=0;
    this.babyScale=1;this.excreteTimer=0;
    this.female=Math.random()<0.5;
    this.eggs=false;this.eggTimer=0;
    this.sick=false;this.sickTimer=0;
  }
  pickWT(){
    this.tx=clamp(this.x+rand(-80,80),30,W-30);
    this.ty=clamp(rand(SAND_Y-70,SAND_Y-5),SAND_Y-70,SAND_Y);
  }
  pickSwimT(){
    this.tx=clamp(this.x+rand(-100,100),35,W-35);
    this.ty=clamp(this.y+rand(-120,-30),H*0.1,H*0.49);
  }
  pickFloatT(){
    this.tx=clamp(this.x+rand(-50,50),35,W-35);
    this.ty=clamp(this.y+rand(-40,40),H*0.1,H*0.51);
  }
  update(dt){
    if(this.dying){this.dyingTimer-=dt;this.y-=2*dt;this.x+=Math.sin(time*0.8)*0.3;return;}
    if(!this.alive)return;
    this.hunger=Math.max(0,this.hunger-0.015*dt);
    if(this.hunger<20)this.hp=Math.max(0,this.hp-0.008*dt);
    if(wq<20)this.hp=Math.max(0,this.hp-0.008*dt);
    // Temperature stress
    if(waterTemp<18||waterTemp>30)this.hp=Math.max(0,this.hp-0.012*dt);
    else if(waterTemp<20||waterTemp>28)this.hp=Math.max(0,this.hp-0.004*dt);
    // Overcrowding stress: >8 shrimp = HP drain (reduced if shelters)
    const aliveN=shrimps.filter(s=>s.alive).length;
    const shelterBonus=Math.min(shelters.length*0.3,0.9);
    if(aliveN>8)this.hp=Math.max(0,this.hp-0.005*(aliveN-8)*(1-shelterBonus)*dt);
    // Shelter stress relief
    if(shelters.length>0&&this.hp<100&&this.hp>10)this.hp=Math.min(100,this.hp+0.001*shelters.length*dt);
    if(this.hunger>50&&wq>50&&this.hp<100)this.hp=Math.min(100,this.hp+0.003*dt);
    if(this.babyScale<1)this.babyScale=Math.min(1,this.babyScale+dt*0.0008);
    // Excretion timer
    if(this.excreteTimer>0){this.excreteTimer-=dt;if(this.excreteTimer<=0){wq=Math.max(0,wq-0.3);}}
    // Disease
    if(this.sick){this.sickTimer-=dt;this.hp=Math.max(0,this.hp-0.006*dt);
      if(this.sickTimer<=0){this.sick=false;notify('💊 エビが回復しました！');}
      // Contagion
      if(Math.random()<0.00005*dt){
        const healthy=shrimps.filter(s=>s.alive&&!s.sick&&s!==this);
        if(healthy.length>0){const t=healthy[randI(0,healthy.length-1)];
          t.sick=true;t.sickTimer=rand(60,120);notify('🦠 病気が伝染しました…');}
      }
    }
    // Egg carrying
    if(this.eggs){this.eggTimer-=dt;
      if(this.eggTimer<=0){this.eggs=false;this.hatchBabies();}
    }
    // Algae grazing (natural food source)
    if(algaeLevel>20&&this.hunger<60&&Math.random()<0.0003*dt){
      this.hunger=Math.min(100,this.hunger+3);algaeLevel=Math.max(0,algaeLevel-0.5);
    }
    this.st+=dt;
    this.lp+=dt*(this.state===ST.WALK?8:this.state===ST.SWIM?14:5);
    this.bw+=dt*2;this.ap+=dt*2.5;
    this.tp+=dt*14;this.bp+=dt*1.5;
    this.depth=clamp(this.baseDepth+Math.sin(time*0.12+this.bp)*0.06,0,1);
    this.mt-=dt;
    if(this.sb>0)this.sb-=dt*3;
    if(this.mt<=0){this.molt();this.mt=rand(90,180);}
    if(this.st>=this.sd)this.pickNewState();

    switch(this.state){
      case ST.TSUMA:this.jm=true;
        if(this.y<SAND_Y-H*0.19){this.y+=this.speed*0.8*dt;this.x+=Math.sin(time*0.3+this.bp)*0.3;}
        else{this.y+=Math.sin(time*1.8+this.bp)*0.06;}
        break;
      case ST.WALK:{
        this.jm=false;
        if(this.y<SAND_Y-H*0.19){this.ty=clamp(rand(SAND_Y-70,SAND_Y-5),SAND_Y-70,SAND_Y);}
        const dx=this.tx-this.x,dy=this.ty-this.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d>3){this.facing=dx>0?1:-1;this.x+=(dx/d)*this.speed*dt;this.y+=(dy/d)*this.speed*dt;}
        else this.st=this.sd;break;}
      case ST.IDLE:this.jm=false;
        if(this.y<SAND_Y-H*0.19){this.y+=this.speed*0.6*dt;this.x+=Math.sin(time*0.3+this.bp)*0.2;}
        else{this.y+=Math.sin(time*1.2+this.bp)*0.04;}
        break;
      case ST.SWIM:{
        this.jm=false;this.sb=1;
        const dx=this.tx-this.x,dy=this.ty-this.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d>5){this.facing=dx>0?1:-1;this.x+=(dx/d)*this.speed*2.8*dt;this.y+=(dy/d)*this.speed*2.2*dt;}
        else{this.pickSwimT();}
        this.x+=Math.sin(time*0.7+this.bp)*0.3;this.y+=Math.cos(time*0.5+this.bp)*0.2;
        break;}
      case ST.FLOAT:{
        this.jm=false;
        const dx=this.tx-this.x,dy=this.ty-this.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d>8){this.facing=dx>0?1:-1;this.x+=(dx/d)*this.speed*0.6*dt;this.y+=(dy/d)*this.speed*0.5*dt;}
        else{this.pickFloatT();}
        this.x+=Math.sin(time*0.4+this.bp)*0.5;this.y+=Math.cos(time*0.3+this.bp+1)*0.4;
        break;}
      case ST.EAT:{
        this.jm=true;let near=null,md=Infinity;
        for(const f of foods){if(f.eaten||!f.settled)continue;const fd=Math.abs(f.x-this.x)+Math.abs(f.y-this.y);if(fd<md){md=fd;near=f;}}
        if(near){const dx=near.x-this.x,dy=near.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
          if(d>7){this.facing=dx>0?1:-1;this.x+=(dx/d)*this.speed*dt;this.y+=(dy/d)*this.speed*dt;}
          else{near.eaten=true;const amt=near.type==='veggie'?10:15;this.hunger=Math.min(100,this.hunger+amt);this.excreteTimer=rand(15,30);}
        }else{this.state=ST.TSUMA;this.st=0;this.sd=rand(3,6);}
        break;}
      case ST.FOLLOW:this.jm=false;break;
    }
    this.x=clamp(this.x,20,W-20);this.y=clamp(this.y,60,SAND_Y+2);
  }
  molt(){
    // Molt failure risk: bad water quality or temperature
    let failChance=0;
    if(wq<30)failChance+=0.25;
    else if(wq<50)failChance+=0.08;
    if(waterTemp<20||waterTemp>28)failChance+=0.15;
    if(this.hunger<20)failChance+=0.10;
    if(Math.random()<failChance){
      this.hp=Math.max(0,this.hp-40);
      notify('💀 脱皮に失敗しました！HPが大幅減少',4000);
      return;
    }
    shells.push(new MoltedShell(this.x,this.y-3,this instanceof BeeShrimp));
    this.tr=Math.min(this.tr+0.06,0.25);
    if(wq<40){notify('🦐 脱皮しました！水が汚れやすくなります💧');}
    else{notify('🦐 脱皮しました！');}
  }
  hatchBabies(){
    const count=randI(2,4);
    for(let i=0;i<count;i++){
      if(shrimps.filter(s=>s.alive).length>=12)break;
      const baby=(this instanceof BeeShrimp)?new BeeShrimp():new ClearShrimp();
      baby.x=clamp(this.x+rand(-15,15),30,W-30);
      baby.y=clamp(this.y+rand(-5,5),60,SAND_Y);
      baby.babyScale=0.35;baby.baseDepth=rand(0,1);baby.depth=baby.baseDepth;
      baby.female=Math.random()<0.5;
      shrimps.push(baby);baby.pickNewState();
    }
    notify('🎉 '+count+'匹の稚エビが孵化しました！',4000);uiTimer=0;
  }
  drawShadow(ctx,bw){
    ctx.save();ctx.globalAlpha=0.07;ctx.fillStyle='rgba(0,12,25,1)';
    ctx.beginPath();ctx.ellipse(-1,14,bw*0.5,2.5,Math.sin(time*0.4)*0.02,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  drawAnt(ctx,bx,by,sc,am){
    const a=am||1;
    const s1=Math.sin(this.ap*0.6),s2=Math.sin(this.ap*0.5+1.2),s3=Math.sin(this.ap*0.7+0.5);
    ctx.lineWidth=0.4;ctx.strokeStyle='rgba(150,130,110,'+(0.28*a).toFixed(2)+')';
    ctx.beginPath();ctx.moveTo(bx,by);
    ctx.bezierCurveTo(bx+14*sc,by-10*sc+s1*3,bx+28*sc,by-18*sc+s1*6,bx+40*sc+s1*4,by-22*sc+s1*8);
    ctx.stroke();
    ctx.strokeStyle='rgba(150,130,110,'+(0.22*a).toFixed(2)+')';
    ctx.beginPath();ctx.moveTo(bx,by+1);
    ctx.bezierCurveTo(bx+12*sc,by-4*sc+s2*3,bx+24*sc,by-6*sc+s2*5,bx+36*sc+s2*3,by-12*sc+s2*7);
    ctx.stroke();
    ctx.lineWidth=0.6;ctx.strokeStyle='rgba(150,130,110,'+(0.30*a).toFixed(2)+')';
    ctx.beginPath();ctx.moveTo(bx-1,by+2);
    ctx.bezierCurveTo(bx+5*sc,by+3*sc+s3*2,bx+9*sc,by+1*sc+s3*3,bx+14*sc+s3*2,by+4*sc+s3*4);
    ctx.stroke();
    ctx.lineWidth=0.5;ctx.strokeStyle='rgba(150,130,110,'+(0.22*a).toFixed(2)+')';
    ctx.beginPath();ctx.moveTo(bx-1,by+3);
    ctx.bezierCurveTo(bx+4*sc,by+5*sc+s3*2,bx+7*sc,by+4*sc+s3*2,bx+12*sc+s3*1.5,by+7*sc+s3*3);
    ctx.stroke();
  }
}

// ============================================================
//  BEE SHRIMP — anatomical bezier silhouette
// ============================================================
class BeeShrimp extends Shrimp{
  constructor(){super(rand(W*0.25,W*0.75),rand(SAND_Y-45,SAND_Y-8));this.speed=15;}
  pickNewState(){
    const r=Math.random();
    if(foods.some(f=>!f.eaten&&f.settled)){this.state=ST.EAT;this.sd=rand(5,10);}
    else if(r<0.35){this.state=ST.TSUMA;this.sd=rand(4,9);}
    else if(r<0.50){this.state=ST.WALK;this.pickWT();this.sd=rand(3,7);}
    else if(r<0.56){this.state=ST.IDLE;this.sd=rand(2,5);}
    else if(r<0.78){this.state=ST.SWIM;this.pickSwimT();this.sd=rand(5,12);}
    else{this.state=ST.FLOAT;this.pickFloatT();this.sd=rand(6,15);}
    this.st=0;if(this.uiId)document.getElementById(this.uiId).textContent=SNB[this.state];
  }
  draw(ctx){
    const dsc=lerp(1,0.62,this.depth)*this.babyScale;
    ctx.save();ctx.translate(this.x,this.y);ctx.scale(this.facing*dsc,dsc);
    ctx.globalAlpha=lerp(1,0.5,this.depth)*(1-this.tr*0.3);
    if(this.dying){ctx.globalAlpha*=Math.max(0,this.dyingTimer/3);ctx.rotate((1-this.dyingTimer/3)*Math.PI*0.5);}
    const w=this.bw,br=Math.sin(this.bp)*0.3,tO=this.jm?Math.sin(this.tp)*0.6:0;
    const ay=(t)=>Math.sin(w+t*2.5)*0.5*(1-t)+br*t;
    const a0=ay(0),a1=ay(.12),a2=ay(.25),a3=ay(.38),a4=ay(.5),a5=ay(.62),a6=ay(.75),a7=ay(.88),a8=ay(1);
    const bodyPath=()=>{
      ctx.beginPath();ctx.moveTo(-22,2+a0);
      ctx.bezierCurveTo(-20,.5+a0,-18,-1+a1,-16,-2.5+a1);
      ctx.bezierCurveTo(-14,-3.8+a2,-12,-5+a2,-10,-5.8+a3);
      ctx.bezierCurveTo(-8,-6.5+a3,-5,-7.2+a3,-2,-7.8+a4);
      ctx.bezierCurveTo(0,-8.2+a4,2,-8.5+a5,4,-8.8+a5);
      ctx.bezierCurveTo(6,-9.2+a5,9,-9.5+a6,12,-9.2+a6);
      ctx.bezierCurveTo(14,-8.8+a7,16,-7.8+a7,18,-6+a7);
      ctx.bezierCurveTo(19,-5+a8,20,-4+a8,21,-3+a8);
      ctx.lineTo(21,2+a8);
      ctx.bezierCurveTo(20,3.5+a8,18,5+a7,16,5.5+a7);
      ctx.bezierCurveTo(14,6+a7,12,6.5+a6,9,7+a6);
      ctx.bezierCurveTo(6,7+a5,3,7+a5,0,6.5+a4);
      ctx.bezierCurveTo(-3,6+a4,-6,5.5+a3,-9,5+a3);
      ctx.bezierCurveTo(-12,4.5+a2,-15,4+a2,-18,3.5+a1);
      ctx.bezierCurveTo(-20,3.2+a1,-21,3+a0,-22,3+a0);
      ctx.closePath();
    };
    this.drawShadow(ctx,48);
    // TAIL FAN
    const tBx=-22,tBy=2.5+a0,fl=this.sb>0?Math.sin(time*18)*3:0;
    ctx.fillStyle='rgba(190,55,45,0.55)';ctx.beginPath();ctx.moveTo(tBx,tBy-1);ctx.quadraticCurveTo(tBx-7,tBy-5+fl*.3,tBx-13,tBy-3+fl*.5);ctx.quadraticCurveTo(tBx-8,tBy-.5,tBx,tBy);ctx.fill();
    ctx.fillStyle='rgba(195,60,50,0.65)';ctx.beginPath();ctx.moveTo(tBx,tBy-.5);ctx.quadraticCurveTo(tBx-9,tBy,tBx-14,tBy+.5);ctx.quadraticCurveTo(tBx-9,tBy+1.5,tBx,tBy+1);ctx.fill();
    ctx.fillStyle='rgba(190,55,45,0.5)';ctx.beginPath();ctx.moveTo(tBx,tBy+.5);ctx.quadraticCurveTo(tBx-7,tBy+5-fl*.3,tBx-12,tBy+5-fl*.5);ctx.quadraticCurveTo(tBx-7,tBy+3,tBx,tBy+1.5);ctx.fill();
    ctx.strokeStyle='rgba(200,180,160,0.08)';ctx.lineWidth=0.3;
    for(let i=0;i<5;i++){const ag=-0.6+i*0.3;ctx.beginPath();ctx.moveTo(tBx-11+Math.abs(i-2),tBy+Math.sin(ag)*3);ctx.lineTo(tBx-15+Math.abs(i-2)*.5,tBy+Math.sin(ag)*5.5);ctx.stroke();}
    // BODY
    bodyPath();ctx.fillStyle='#c43333';ctx.fill();
    ctx.save();bodyPath();ctx.clip();
    for(const[x1,x2]of[[-23,-16],[-9,-3],[3,9],[17,22]]){ctx.fillStyle='#ede5d8';ctx.fillRect(x1,-14,x2-x1,28);}
    const hlG=ctx.createLinearGradient(0,-10,0,8);
    hlG.addColorStop(0,'rgba(255,230,220,0.25)');hlG.addColorStop(0.35,'rgba(255,200,180,0.08)');hlG.addColorStop(0.7,'rgba(0,0,0,0)');hlG.addColorStop(1,'rgba(0,0,0,0.1)');
    ctx.fillStyle=hlG;ctx.fillRect(-24,-14,50,28);ctx.restore();
    bodyPath();ctx.strokeStyle='rgba(140,30,25,0.12)';ctx.lineWidth=0.6;ctx.stroke();
    // SEGMENT LINES
    ctx.strokeStyle='rgba(0,0,0,0.07)';ctx.lineWidth=0.5;
    for(const sx of[-18,-14,-10,-6,-2,2]){const t=(sx+22)/44,aO=ay(t);ctx.beginPath();ctx.moveTo(sx,lerp(0,-8.5,Math.min(t*1.3,1))+aO);ctx.lineTo(sx+.3,lerp(3.5,7,Math.min(t*1.1,1))+aO);ctx.stroke();}
    ctx.strokeStyle='rgba(0,0,0,0.09)';ctx.lineWidth=0.6;ctx.beginPath();ctx.moveTo(5,-8.8+a5);ctx.lineTo(5.3,7+a5);ctx.stroke();
    // PLEOPODS
    ctx.lineWidth=0.5;
    for(let i=0;i<5;i++){const lx=-16+i*4.5,t2=(lx+22)/44,aO=ay(t2),baseY2=lerp(3.5,6.5,Math.min(t2*1.1,1))+aO,sw=Math.sin(this.lp+i*1.1)*2;
      ctx.strokeStyle='rgba(200,120,100,0.25)';ctx.beginPath();ctx.moveTo(lx,baseY2);ctx.quadraticCurveTo(lx+sw*.5,baseY2+3,lx+sw,baseY2+5.5);ctx.stroke();
      ctx.strokeStyle='rgba(200,140,120,0.12)';ctx.beginPath();ctx.moveTo(lx+sw,baseY2+5.5);ctx.lineTo(lx+sw+.8,baseY2+6.5);ctx.stroke();ctx.beginPath();ctx.moveTo(lx+sw,baseY2+5.5);ctx.lineTo(lx+sw-.8,baseY2+6.5);ctx.stroke();}
    // PEREIOPODS
    ctx.strokeStyle='rgba(200,140,120,0.4)';ctx.lineWidth=0.6;
    for(let i=0;i<5;i++){const lx=7+i*2.8,aO=ay(.65+i*.05),baseY2=6+aO,sw=Math.sin(this.lp*1.2+i*1.3)*2;
      ctx.beginPath();ctx.moveTo(lx,baseY2);ctx.lineTo(lx+sw*.3,baseY2+4);ctx.lineTo(lx+sw,baseY2+7.5);ctx.stroke();}
    // EGGS (if carrying)

class ClearShrimp extends Shrimp{

    if(foods.some(f=>!f.eaten&&f.settled)){if(Math.random()<.55){this.state=ST.EAT;this.sd=rand(5,10);}else{this.state=ST.TSUMA;this.sd=rand(3,6);}}
    else if(r<.30){this.state=ST.TSUMA;this.sd=rand(4,10);}
    else if(r<.45){this.state=ST.WALK;const p=plants[randI(0,plants.length-1)];this.tx=p.x+rand(-20,20);this.ty=clamp(p.y-rand(3,15),SAND_Y-55,SAND_Y);this.sd=rand(3,7);}
    else if(r<.52){this.state=ST.IDLE;this.sd=rand(3,8);}
    else if(r<.60){this.state=ST.FOLLOW;this.sd=rand(4,8);}
    else if(r<.82){this.state=ST.SWIM;this.pickSwimT();this.sd=rand(5,12);}
    else{this.state=ST.FLOAT;this.pickFloatT();this.sd=rand(6,15);}
    this.st=0;if(this.uiId)document.getElementById(this.uiId).textContent=SNC[this.state];
  }
  update(dt){super.update(dt);
    if(this.dying||!this.alive)return;
    if(this.state===ST.FOLLOW){const leader=shrimps.find(s=>s.alive&&s!==this);
      if(!leader){this.state=ST.TSUMA;this.st=0;this.sd=rand(3,6);return;}
      const dx=leader.x-30*this.facing-this.x,dy=leader.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d>20){this.facing=dx>0?1:-1;this.x+=(dx/d)*this.speed*.7*dt;this.y+=(dy/d)*this.speed*.25*dt;}}
  }
  draw(ctx){
    const sc=0.82,dsc=lerp(1,0.62,this.depth)*this.babyScale;ctx.save();ctx.translate(this.x,this.y);ctx.scale(this.facing*sc*dsc,sc*dsc);
    const alpha=(this.bA-this.tr*0.15)*lerp(1,0.5,this.depth);ctx.globalAlpha=alpha;
    if(this.dying){ctx.globalAlpha=alpha*Math.max(0,this.dyingTimer/3);ctx.rotate((1-this.dyingTimer/3)*Math.PI*0.5);}
    const w=this.bw,br=Math.sin(this.bp)*.3,tO=this.jm?Math.sin(this.tp)*.5:0;
    const ay=(t)=>Math.sin(w+t*2.5)*.4*(1-t)+br*t;
    const a0=ay(0),a1=ay(.12),a2=ay(.25),a3=ay(.38),a4=ay(.5),a5=ay(.62),a6=ay(.75),a7=ay(.88),a8=ay(1);
    const bodyPath=()=>{ctx.beginPath();ctx.moveTo(-22,2+a0);
      ctx.bezierCurveTo(-20,.5+a0,-18,-1+a1,-16,-2.5+a1);ctx.bezierCurveTo(-14,-3.8+a2,-12,-5+a2,-10,-5.8+a3);
      ctx.bezierCurveTo(-8,-6.5+a3,-5,-7.2+a3,-2,-7.8+a4);ctx.bezierCurveTo(0,-8.2+a4,2,-8.5+a5,4,-8.8+a5);
      ctx.bezierCurveTo(6,-9.2+a5,9,-9.5+a6,12,-9.2+a6);ctx.bezierCurveTo(14,-8.8+a7,16,-7.8+a7,18,-6+a7);
      ctx.bezierCurveTo(19,-5+a8,20,-4+a8,21,-3+a8);ctx.lineTo(21,2+a8);
      ctx.bezierCurveTo(20,3.5+a8,18,5+a7,16,5.5+a7);ctx.bezierCurveTo(14,6+a7,12,6.5+a6,9,7+a6);
      ctx.bezierCurveTo(6,7+a5,3,7+a5,0,6.5+a4);ctx.bezierCurveTo(-3,6+a4,-6,5.5+a3,-9,5+a3);
      ctx.bezierCurveTo(-12,4.5+a2,-15,4+a2,-18,3.5+a1);ctx.bezierCurveTo(-20,3.2+a1,-21,3+a0,-22,3+a0);ctx.closePath();};
    this.drawShadow(ctx,44);ctx.globalAlpha=alpha;
    // TAIL
    const tBx=-22,tBy=2.5+a0,fl=this.sb>0?Math.sin(time*18)*2:0;
    ctx.fillStyle='rgba(180,210,195,.45)';ctx.beginPath();ctx.moveTo(tBx,tBy-1);ctx.quadraticCurveTo(tBx-6,tBy-4+fl*.3,tBx-11,tBy-2.5+fl*.4);ctx.quadraticCurveTo(tBx-7,tBy-.5,tBx,tBy);ctx.fill();
    ctx.fillStyle='rgba(185,215,200,.5)';ctx.beginPath();ctx.moveTo(tBx,tBy-.5);ctx.quadraticCurveTo(tBx-8,tBy,tBx-12,tBy+.5);ctx.quadraticCurveTo(tBx-8,tBy+1,tBx,tBy+.8);ctx.fill();
    ctx.fillStyle='rgba(180,210,195,.4)';ctx.beginPath();ctx.moveTo(tBx,tBy+.5);ctx.quadraticCurveTo(tBx-6,tBy+4-fl*.3,tBx-10,tBy+4-fl*.4);ctx.quadraticCurveTo(tBx-6,tBy+2.5,tBx,tBy+1.2);ctx.fill();
    // BODY
    bodyPath();const bG=ctx.createRadialGradient(0,-2,0,0,0,22);
    bG.addColorStop(0,'rgba(200,220,210,.55)');bG.addColorStop(.6,'rgba(190,215,205,.38)');bG.addColorStop(1,'rgba(175,200,190,.22)');
    ctx.fillStyle=bG;ctx.fill();
    bodyPath();ctx.strokeStyle='rgba(160,185,175,.32)';ctx.lineWidth=.6;ctx.stroke();

    ctx.save();bodyPath();ctx.clip();
    ctx.fillStyle='rgba(210,170,100,'+(0.18+Math.sin(time*.8)*.03).toFixed(3)+')';ctx.beginPath();ctx.ellipse(5,-1+a5,5,3,.1,0,Math.PI*2);ctx.fill();

    ctx.fillStyle=hlG2;ctx.fillRect(-24,-14,50,28);ctx.restore();

    for(const sx of[-18,-14,-10,-6,-2,2,5]){const t2=(sx+22)/44,aO=ay(t2);ctx.beginPath();ctx.moveTo(sx,lerp(0,-8.5,Math.min(t2*1.3,1))+aO);ctx.lineTo(sx,lerp(3.5,7,Math.min(t2*1.1,1))+aO);ctx.stroke();}

    for(let i=0;i<5;i++){const lx=-16+i*4.5,t2=(lx+22)/44,aO=ay(t2),baseY2=lerp(3.5,6.5,Math.min(t2*1.1,1))+aO,sw=Math.sin(this.lp+i*1.1)*1.5;ctx.beginPath();ctx.moveTo(lx,baseY2);ctx.lineTo(lx+sw,baseY2+4.5);ctx.stroke();}
    // PEREIOPODS
    ctx.strokeStyle='rgba(170,195,185,.45)';ctx.lineWidth=.6;
    for(let i=0;i<4;i++){const lx=7+i*3,aO=ay(.65+i*.06),baseY2=6+aO,sw=Math.sin(this.lp*1.2+i*1.3)*1.5;ctx.beginPath();ctx.moveTo(lx,baseY2);ctx.lineTo(lx+sw*.3,baseY2+3.5);ctx.lineTo(lx+sw,baseY2+6);ctx.stroke();}
    // EGGS (if carrying)
    if(this.eggs){ctx.globalAlpha=alpha*0.8;ctx.fillStyle='rgba(200,180,80,0.6)';
      for(let i=0;i<5;i++){const ex=-8+i*4,ey=6+ay((ex+22)/44)+Math.sin(time*2+i)*0.3;
        ctx.beginPath();ctx.arc(ex,ey,1.2,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=alpha;}
    // ROSTRUM
    ctx.fillStyle='rgba(185,210,200,.40)';ctx.beginPath();ctx.moveTo(21,-3.5+a8);ctx.lineTo(25,-4.5+a8);ctx.lineTo(21,-2+a8);ctx.closePath();ctx.fill();

    ctx.fillStyle='rgba(255,255,255,.6)';ctx.beginPath();ctx.arc(eyeX+.7,eyeY-.4,.35,0,Math.PI*2);ctx.fill();ctx.globalAlpha=alpha;

function shrimpStatusText(s){

  if(s.hunger<15)return '😣 お腹すいた';

}

function drawGlass(ctx){

  ctx.fillStyle=gl;ctx.fillRect(0,0,32,H);
  const gr=ctx.createLinearGradient(W,0,W-32,0);gr.addColorStop(0,'rgba(0,8,18,0.28)');gr.addColorStop(1,'rgba(0,8,18,0)');
  ctx.fillStyle=gr;ctx.fillRect(W-32,0,32,H);
  const gt=ctx.createLinearGradient(0,0,0,20);gt.addColorStop(0,'rgba(0,8,18,0.2)');gt.addColorStop(1,'rgba(0,8,18,0)');
  ctx.fillStyle=gt;ctx.fillRect(0,0,W,20);
  const gb=ctx.createLinearGradient(0,H,0,H-24);gb.addColorStop(0,'rgba(0,8,18,0.28)');gb.addColorStop(1,'rgba(0,8,18,0)');
  ctx.fillStyle=gb;ctx.fillRect(0,H-24,W,24);
  // Glass reflection lines
  ctx.globalAlpha=0.04;ctx.fillStyle='rgba(195,235,255,1)';ctx.fillRect(12,22,1.5,H-44);
  ctx.globalAlpha=0.025;ctx.fillRect(17,35,0.8,H-70);
  ctx.globalAlpha=0.035;ctx.fillRect(W-14,30,1.2,H-60);
  // Diagonal window reflection streak
  ctx.save();ctx.globalAlpha=0.022;ctx.translate(W*0.28,0);ctx.rotate(0.16);
  const sk=ctx.createLinearGradient(-25,0,25,0);
  sk.addColorStop(0,'rgba(255,255,255,0)');sk.addColorStop(0.35,'rgba(255,255,255,0.5)');
  sk.addColorStop(0.5,'rgba(255,255,255,1)');sk.addColorStop(0.65,'rgba(255,255,255,0.5)');
  sk.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sk;ctx.fillRect(-25,-10,50,H+20);ctx.restore();
  ctx.save();ctx.globalAlpha=0.012;ctx.translate(W*0.62,0);ctx.rotate(0.13);
  const sk2=ctx.createLinearGradient(-40,0,40,0);
  sk2.addColorStop(0,'rgba(255,255,255,0)');sk2.addColorStop(0.4,'rgba(255,255,255,0.3)');
  sk2.addColorStop(0.5,'rgba(255,255,255,0.5)');sk2.addColorStop(0.6,'rgba(255,255,255,0.3)');
  sk2.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sk2;ctx.fillRect(-40,-10,80,H+20);ctx.restore();
  // Room ambient reflection
  ctx.globalCompositeOperation='screen';
  ctx.globalAlpha=0.018+Math.sin(time*0.08)*0.004;
  const rx=W*0.55+Math.sin(time*0.04)*10,ry=H*0.22+Math.cos(time*0.06)*6;
  const rgl=ctx.createRadialGradient(rx,ry,0,rx,ry,H*0.28);
  rgl.addColorStop(0,'rgba(255,240,215,0.7)');rgl.addColorStop(0.5,'rgba(245,225,200,0.25)');
  rgl.addColorStop(1,'rgba(245,225,200,0)');
  ctx.fillStyle=rgl;ctx.fillRect(0,0,W,H);
  // Corner vignette
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;
  const vR=Math.max(W,H)*0.72;
  const vg=ctx.createRadialGradient(W/2,H/2,vR*0.55,W/2,H/2,vR);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,5,12,0.18)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

// ============================================================
//  POST-PROCESSING (bloom, color grade, grain)
// ============================================================
const ppC=document.createElement('canvas');const ppX=ppC.getContext('2d');
function drawPostProcess(ctx){
  // Bloom: downscale → upsample with screen blend
  const bw=Math.ceil(W/8),bh=Math.ceil(H/8);
  ppC.width=bw;ppC.height=bh;
  ppX.drawImage(C,0,0,bw,bh);
  ctx.save();ctx.globalCompositeOperation='screen';ctx.imageSmoothingEnabled=true;
  ctx.globalAlpha=0.07;ctx.drawImage(ppC,0,0,W,H);
  // Wider bloom pass
  const bw2=Math.ceil(W/24),bh2=Math.ceil(H/24);
  ppC.width=bw2;ppC.height=bh2;
  ppX.drawImage(C,0,0,bw2,bh2);
  ctx.globalAlpha=0.04;ctx.drawImage(ppC,0,0,W,H);
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;ctx.restore();
  // Color grading: warm highlights, cool shadows
  ctx.save();ctx.globalCompositeOperation='overlay';ctx.globalAlpha=0.025;
  const cg=ctx.createLinearGradient(0,0,0,H);
  cg.addColorStop(0,'rgba(255,225,175,1)');cg.addColorStop(0.45,'rgba(210,220,240,1)');
  cg.addColorStop(1,'rgba(90,130,175,1)');
  ctx.fillStyle=cg;ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;ctx.restore();
  // Subtle film grain
  ctx.save();ctx.globalAlpha=0.012;
  for(let i=0;i<60;i++){ctx.fillStyle=Math.random()>0.5?'#fff':'#000';ctx.fillRect(Math.random()*W|0,Math.random()*H|0,1,1);}
  ctx.globalAlpha=1;ctx.restore();
}

// ============================================================
//  MAIN LOOP
// ============================================================
function render(now){
  const dt=Math.min((now-lt)/1000,0.05);lt=now;time+=dt;
  // ── Water Temperature ──
  const targetTemp=heaterOn?25:ambientTemp;
  waterTemp+=(targetTemp-waterTemp)*dt*0.008;
  waterTemp=clamp(waterTemp,0,45);
  const tmpEl=document.getElementById('tempVal');
  tmpEl.textContent=waterTemp.toFixed(1)+'℃';
  tmpEl.style.color=(waterTemp>=22&&waterTemp<=26)?'rgba(195,225,255,0.88)':(waterTemp>=18&&waterTemp<=30)?'#e8c44a':'#e85050';
  const tPct=clamp((waterTemp-10)/30*100,0,100);
  const tBar=document.getElementById('tempBar');
  tBar.style.width=tPct+'%';
  tBar.style.background=(waterTemp>=22&&waterTemp<=26)?'linear-gradient(90deg,#2ec88a,#6ee8b0)':(waterTemp>=18&&waterTemp<=30)?'linear-gradient(90deg,#c8962e,#e8c46e)':'linear-gradient(90deg,#c83030,#e86060)';

  // ── Lighting & Algae ──
  const jstH=new Date(Date.now()+(new Date().getTimezoneOffset()+540)*60000).getHours();
  const isDaylight=jstH>=7&&jstH<19;
  if(lightMode==='auto')lightOn=isDaylight;
  else lightOn=(lightMode==='on');
  const targetBright=lightOn?1:0.28;
  lightBrightness+=(targetBright-lightBrightness)*dt*0.8; // smooth transition
  if(lightOn){algaeLevel=Math.min(100,algaeLevel+0.002*dt);}
  else{algaeLevel=Math.max(0,algaeLevel-0.0005*dt);}

  // ── Water quality ──
  const aliveCount=shrimps.filter(s=>s.alive).length;
  const bioLoad=0.025+aliveCount*0.003;
  const rottingFood=foods.filter(f=>f.rotting&&!f.eaten).length;
  const shellCount=shells.length;
  const plantPurify=plants.length*0.0008;
  const filterBonus=filterOn?0.012:0;
  wq=clamp(wq+dt*(-bioLoad-rottingFood*0.012-shellCount*0.006+plantPurify+filterBonus),0,100);
  const wBarEl=document.getElementById('wBar');
  wBarEl.style.width=wq+'%';
  wBarEl.style.background=wq>50?'linear-gradient(90deg,#2e9cc8,#6ec4e8)':wq>25?'linear-gradient(90deg,#c8962e,#e8c46e)':'linear-gradient(90deg,#c83030,#e86060)';

  for(const s of shrimps)s.update(dt);

  for(let i=shrimps.length-1;i>=0;i--){
    const s=shrimps[i];
    if(s.alive&&s.hp<=0){s.alive=false;s.dying=true;s.dyingTimer=3;
      wq=Math.max(0,wq-8); // corpse pollutes water heavily
      notify('😢 エビが天国へ旅立ちました…水質が悪化しています！',4000);uiTimer=0;}
    if(s.dying&&s.dyingTimer<=0){shrimps.splice(i,1);uiTimer=0;}
  }
  if(!gameOver&&shrimps.length===0){gameOver=true;notify('😢 全てのエビがいなくなりました…\nリロードでリスタート',120000);}

  breedTimer-=dt;
  if(breedTimer<=0){
    breedTimer=rand(90,150);
    const alive=shrimps.filter(s=>s.alive&&!s.sick);
    if(alive.length>=2&&alive.length<12){
      const avgHp=alive.reduce((a,e)=>a+e.hp,0)/alive.length;
      const avgHun=alive.reduce((a,e)=>a+e.hunger,0)/alive.length;
      if(avgHp>80&&avgHun>60&&wq>70&&waterTemp>=22&&waterTemp<=26&&Math.random()<0.30){
        const females=alive.filter(s=>s.female&&!s.eggs&&s.babyScale>=0.9);
        if(females.length>0){
          const mom=females[randI(0,females.length-1)];
          mom.eggs=true;mom.eggTimer=rand(60,100);
          notify('🥚 抱卵しました！孵化を待ちましょう',4000);uiTimer=0;
        }
      }
    }
  }

  // ── Disease random event ──
  diseaseTimer-=dt;
  if(diseaseTimer<=0){
    diseaseTimer=rand(180,360);
    const alive2=shrimps.filter(s=>s.alive&&!s.sick);
    let dChance=0.05;
    if(wq<30)dChance+=0.25;
    if(waterTemp<20||waterTemp>28)dChance+=0.15;
    if(aliveCount>8)dChance+=0.10;
    if(Math.random()<dChance&&alive2.length>0){
      const victim=alive2[randI(0,alive2.length-1)];
      victim.sick=true;victim.sickTimer=rand(60,120);
      notify('🦠 エビが病気になりました…',4000);uiTimer=0;
    }
  }

  uiTimer-=dt;
  if(uiTimer<=0){uiTimer=0.5;updateShrimpUI();}

  updateParts(dt);
  for(const f of foods)f.update(dt);
  for(let i=foods.length-1;i>=0;i--)if(foods[i].alpha<=0)foods.splice(i,1);
  for(const s of shells)s.update(dt);
  for(let i=shells.length-1;i>=0;i--)if(shells[i].alpha<=0)shells.splice(i,1);

  X.save();

  drawBG(X);
  drawSurface(X,time);
  drawSand(X,time);
  drawCaustics(X,time);

  for(const p of plants){if(p.depth>=0.4)p.draw(X,time);}
  drawParts(X);
  for(const f of foods)f.draw(X);
  for(const s of shells)s.draw(X);

  const _ds=[...shrimps].sort((a,b)=>b.depth-a.depth);for(const s of _ds)s.draw(X);

  for(const p of plants){if(p.depth<0.4)p.draw(X,time);}

  drawHaze(X,time);
  drawBubs(X,time);
  // Draw algae on glass if level high
  if(algaeLevel>15){
    X.save();X.globalAlpha=algaeLevel*0.002;
    X.fillStyle='rgba(80,130,50,0.3)';
    // Patchy algae on left/right edges and bottom
    for(let i=0;i<Math.floor(algaeLevel/8);i++){
      const ax=Math.random()<0.5?rand(2,18):rand(W-18,W-2);
      const ay=rand(H*0.2,H*0.9);
      X.beginPath();X.arc(ax,ay,rand(3,8+algaeLevel*0.08),0,Math.PI*2);X.fill();
    }
    // Bottom algae
    for(let i=0;i<Math.floor(algaeLevel/12);i++){
      const ax=rand(20,W-20),ay=rand(SAND_Y-15,SAND_Y+5);
      X.beginPath();X.arc(ax,ay,rand(2,6),0,Math.PI*2);X.fill();
    }
    X.restore();
  }

  // Draw shelter
  for(const sh of shelters){
    X.save();X.translate(sh.x,sh.y);
    X.fillStyle='rgba(100,80,55,0.6)';
    X.beginPath();X.moveTo(-sh.w/2,0);X.lineTo(0,-sh.h);X.lineTo(sh.w/2,0);X.closePath();X.fill();
    X.fillStyle='rgba(80,65,42,0.5)';
    X.fillRect(-sh.w/2,0,sh.w,3);
    X.strokeStyle='rgba(60,50,35,0.3)';X.lineWidth=0.5;
    X.beginPath();X.moveTo(-sh.w/2,0);X.lineTo(0,-sh.h);X.lineTo(sh.w/2,0);X.closePath();X.stroke();
    X.restore();
  }

  drawGlass(X);
  drawPostProcess(X);

  // ── Night dimming overlay ──
  if(lightBrightness<0.99){
    const dim=1-lightBrightness; // 0..0.72
    X.save();
    // Deep blue-black overlay
    X.globalAlpha=dim*0.65;
    X.fillStyle='rgba(4,8,22,1)';
    X.fillRect(0,0,W,H);
    // Moonlight shimmer (subtle)
    if(dim>0.3){
      X.globalAlpha=(dim-0.3)*0.06;
      X.globalCompositeOperation='screen';
      const mx=W*0.35+Math.sin(time*0.15)*20,my=H*0.12+Math.cos(time*0.12)*8;
      const mg=X.createRadialGradient(mx,my,0,mx,my,H*0.45);
      mg.addColorStop(0,'rgba(140,170,220,0.5)');
      mg.addColorStop(0.4,'rgba(100,130,180,0.15)');
      mg.addColorStop(1,'rgba(60,80,120,0)');
      X.fillStyle=mg;X.fillRect(0,0,W,H);
      X.globalCompositeOperation='source-over';
    }
    X.restore();
  }

  X.restore();
  requestAnimationFrame(render);
}

// ============================================================
//  AMBIENT BGM — Web Audio API generative music
// ============================================================
const BGM=(()=>{
  let ctx,master,started=false,playing=false;
  const PENTA=[0,2,4,7,9]; // pentatonic intervals
  const BASE=48; // C3 MIDI
  const midi2f=n=>440*Math.pow(2,(n-69)/12);

  function createReverb(ac,decay,wet){
    const len=ac.sampleRate*decay;
    const buf=ac.createBuffer(2,len,ac.sampleRate);
    for(let ch=0;ch<2;ch++){
      const d=buf.getChannelData(ch);
      for(let i=0;i<len;i++){d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.2);}
    }
    const conv=ac.createConvolver();conv.buffer=buf;
    const g=ac.createGain();g.gain.value=wet;
    conv.connect(g);
    return{input:conv,output:g};
  }

  function init(){
    ctx=new(window.AudioContext||window.webkitAudioContext)();
    master=ctx.createGain();master.gain.value=0;
    // Master filter — underwater character
    const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=1800;lp.Q.value=0.5;
    master.connect(lp);
    // Reverb
    const rev=createReverb(ctx,3.5,0.55);
    lp.connect(rev.input);
    lp.connect(ctx.destination);
    rev.output.connect(ctx.destination);

    // ── Layer 1: Deep drone pad ──
    function drone(freq,detune,vol){
      const o=ctx.createOscillator();o.type='sine';o.frequency.value=freq;o.detune.value=detune;
      const g=ctx.createGain();g.gain.value=vol;
      const lfo=ctx.createOscillator();lfo.type='sine';lfo.frequency.value=0.06+Math.random()*0.04;
      const lfoG=ctx.createGain();lfoG.gain.value=vol*0.3;
      lfo.connect(lfoG);lfoG.connect(g.gain);
      o.connect(g);g.connect(master);
      o.start();lfo.start();
    }
    // C2 + G2 open fifth drone
    drone(midi2f(36),0,0.08);
    drone(midi2f(36),-8,0.06);
    drone(midi2f(43),5,0.055);
    drone(midi2f(43),-5,0.045);
    // Sub bass
    drone(midi2f(24),0,0.04);

    // ── Layer 2: Warm pad (triangle, slow LFO) ──
    function pad(freq,vol){
      const o=ctx.createOscillator();o.type='triangle';o.frequency.value=freq;
      const g=ctx.createGain();g.gain.value=0;
      const lfo=ctx.createOscillator();lfo.type='sine';lfo.frequency.value=0.03+Math.random()*0.02;
      const lfoG=ctx.createGain();lfoG.gain.value=vol;
      lfo.connect(lfoG);lfoG.connect(g.gain);
      o.connect(g);g.connect(master);
      o.start();lfo.start();
    }
    pad(midi2f(60),0.035); // C4
    pad(midi2f(64),0.025); // E4
    pad(midi2f(67),0.028); // G4

    // ── Layer 3: Random bell tones (pentatonic) ──
    function bell(){
      if(!playing)return;
      const oct=Math.random()<0.5?0:12;
      const note=BASE+PENTA[Math.floor(Math.random()*PENTA.length)]+oct;
      const freq=midi2f(note);

      const o=ctx.createOscillator();
      o.type='sine';o.frequency.value=freq;
      const o2=ctx.createOscillator();
      o2.type='sine';o2.frequency.value=freq*2.01; // slight inharmonic shimmer

      const g=ctx.createGain();
      const vol=0.04+Math.random()*0.025;
      const now=ctx.currentTime;
      g.gain.setValueAtTime(0,now);
      g.gain.linearRampToValueAtTime(vol,now+0.08);
      g.gain.exponentialRampToValueAtTime(0.001,now+4+Math.random()*3);

      const g2=ctx.createGain();g2.gain.value=0.015;

      o.connect(g);o2.connect(g2);g2.connect(g);g.connect(master);
      o.start(now);o2.start(now);
      o.stop(now+7);o2.stop(now+7);

      setTimeout(bell,(2500+Math.random()*5000));
    }
    // Start multiple bell voices with offset
    setTimeout(bell,1000);
    setTimeout(bell,3200);
    setTimeout(bell,5800);

    // ── Layer 4: Occasional water shimmer (filtered noise burst) ──
    function shimmer(){
      if(!playing)return;
      const dur=1.5+Math.random()*2;
      const bufLen=ctx.sampleRate*dur;
      const buf=ctx.createBuffer(1,bufLen,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<bufLen;i++)d[i]=(Math.random()*2-1)*0.015;
      const src=ctx.createBufferSource();src.buffer=buf;
      const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=800+Math.random()*1200;bp.Q.value=2+Math.random()*3;
      const g=ctx.createGain();
      const now=ctx.currentTime;
      g.gain.setValueAtTime(0,now);
      g.gain.linearRampToValueAtTime(0.08+Math.random()*0.04,now+dur*0.3);
      g.gain.linearRampToValueAtTime(0,now+dur);
      src.connect(bp);bp.connect(g);g.connect(master);
      src.start(now);
      setTimeout(shimmer,6000+Math.random()*10000);
    }
    setTimeout(shimmer,4000);

    started=true;
  }

  function fadeIn(){
    if(!started)init();
    if(ctx.state==='suspended')ctx.resume();
    playing=true;
    master.gain.cancelScheduledValues(ctx.currentTime);
    master.gain.linearRampToValueAtTime(1,ctx.currentTime+2);
  }
  function fadeOut(){
    if(!started)return;
    playing=false;
    master.gain.cancelScheduledValues(ctx.currentTime);
    master.gain.linearRampToValueAtTime(0,ctx.currentTime+1.5);
  }
  return{fadeIn,fadeOut,get playing(){return playing}};
})();

  else{BGM.fadeIn();document.getElementById('bgmLbl').textContent='BGM';document.querySelector('#bgmBtn .ic').textContent='🔊';}

// ============================================================
//  SAVE / LOAD SYSTEM
// ============================================================
const SAVE_KEY='aquarium_save_v1';
let autoSaveTimer=0;

function buildSaveData(){
  return {
    version:'4.2.0',
    savedAt:Date.now(),
    wq:wq,
    waterTemp:waterTemp,
    heaterOn:heaterOn,
    filterOn:filterOn,
    lightMode:lightMode,
    algaeLevel:algaeLevel,
    breedTimer:breedTimer,
    diseaseTimer:diseaseTimer,
    gameOver:gameOver,
    shrimps:shrimps.map(s=>({
      type:s instanceof BeeShrimp?'bee':'clear',
      x:s.x,y:s.y,
      depth:s.depth,baseDepth:s.baseDepth,
      hunger:s.hunger,hp:s.hp,
      alive:s.alive,dying:s.dying,dyingTimer:s.dyingTimer,
      babyScale:s.babyScale,
      female:s.female,
      eggs:s.eggs,eggTimer:s.eggTimer,
      sick:s.sick,sickTimer:s.sickTimer,
      mt:s.mt,tr:s.tr,
      facing:s.facing,state:s.state
    })),
    shelters:shelters.map(sh=>({x:sh.x,y:sh.y,w:sh.w,h:sh.h}))
  };
}

function applySaveData(data){
  if(!data||!data.version)return false;
  wq=data.wq!=null?data.wq:100;
  waterTemp=data.waterTemp!=null?data.waterTemp:25;
  heaterOn=!!data.heaterOn;
  filterOn=!!data.filterOn;
  lightMode=data.lightMode||'auto';
  algaeLevel=data.algaeLevel||0;
  breedTimer=data.breedTimer||120;
  diseaseTimer=data.diseaseTimer||rand(180,360);
  gameOver=!!data.gameOver;

  // Restore UI toggles
  document.getElementById('heaterLbl').textContent=heaterOn?'ヒーターON':'ヒーター';
  document.querySelector('#heaterBtn .ic').textContent=heaterOn?'🔥':'🌡️';
  document.getElementById('filterLbl').textContent=filterOn?'ろ過ON':'ろ過OFF';
  document.querySelector('#filterBtn .ic').textContent=filterOn?'🔄':'⚙️';
  if(lightMode==='on'){document.getElementById('lightLbl').textContent='照明ON';document.querySelector('#lightBtn .ic').textContent='☀️';}
  else if(lightMode==='off'){document.getElementById('lightLbl').textContent='照明OFF';document.querySelector('#lightBtn .ic').textContent='🌙';}
  else{document.getElementById('lightLbl').textContent='照明AUTO';document.querySelector('#lightBtn .ic').textContent='💡';}

  // Rebuild shrimps
  shrimps.length=0;
  if(data.shrimps&&data.shrimps.length>0){
    for(const sd of data.shrimps){
      const s=sd.type==='bee'?new BeeShrimp():new ClearShrimp();
      s.x=sd.x;s.y=sd.y;
      s.depth=sd.depth;s.baseDepth=sd.baseDepth;
      s.hunger=sd.hunger;s.hp=sd.hp;
      s.alive=sd.alive;s.dying=sd.dying;s.dyingTimer=sd.dyingTimer||0;
      s.babyScale=sd.babyScale!=null?sd.babyScale:1;
      s.female=sd.female!=null?sd.female:Math.random()<0.5;
      s.eggs=!!sd.eggs;s.eggTimer=sd.eggTimer||0;
      s.sick=!!sd.sick;s.sickTimer=sd.sickTimer||0;
      s.mt=sd.mt||rand(60,120);s.tr=sd.tr||0;
      s.facing=sd.facing||1;s.state=sd.state||0;
      s.st=0;s.sd=rand(3,8);
      shrimps.push(s);
    }
  }

  // Rebuild shelters
  shelters.length=0;
  if(data.shelters){
    for(const sh of data.shelters)shelters.push({x:sh.x,y:sh.y,w:sh.w,h:sh.h});
  }
  if(shelters.length===0){
    for(let i=0;i<2;i++)shelters.push({x:rand(W*0.2+i*W*0.4,W*0.35+i*W*0.4),y:SAND_Y-2,w:rand(18,28),h:rand(12,18)});
  }

  uiTimer=0;
  return true;
}

function saveToStorage(){
  try{
    localStorage.setItem(SAVE_KEY,JSON.stringify(buildSaveData()));
    return true;
  }catch(e){return false;}
}

function loadFromStorage(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return false;
    return applySaveData(JSON.parse(raw));
  }catch(e){return false;}
}

// Auto-save every 60 seconds
setInterval(()=>{if(!gameOver&&shrimps.length>0)saveToStorage();},60000);

// Save/Load buttons
