<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>癒し水槽 ― 海老育成</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060e1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', 'Yu Gothic UI', sans-serif;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }
  #gameContainer {
    position: relative;
    width: 960px;
    height: 640px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow:
      0 0 80px rgba(60,160,240,0.18),
      0 0 160px rgba(30,80,160,0.10),
      inset 0 0 80px rgba(0,0,0,0.15);
  }
  canvas { display: block; width: 100%; height: 100%; }
  #ui {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }
  #topBar {
    position: absolute;
    top: 14px; left: 14px; right: 14px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
  }
  .status-panel {
    background: rgba(8,20,40,0.55);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    border-radius: 10px;
    border: 1px solid rgba(100,180,255,0.08);
    padding: 8px 14px;
    color: rgba(190,225,255,0.85);
    font-size: 12px;
    line-height: 1.7;
    pointer-events: auto;
  }
  .status-panel .label { color: rgba(140,190,230,0.6); font-size: 10px; }
  .status-panel .value { font-weight: 600; }
  #shrimpInfo { text-align: right; }
  .water-bar {
    width: 100px; height: 5px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    margin-top: 4px;
    overflow: hidden;
  }
  .water-bar-fill {
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, #3aa8d8, #7ecaea);
    border-radius: 3px;
    transition: width 0.8s ease;
  }
  #bottomBar {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    pointer-events: auto;
  }
  .btn {
    background: rgba(8,20,40,0.55);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(100,180,255,0.1);
    border-radius: 10px;
    padding: 8px 16px;
    color: rgba(190,225,255,0.88);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .btn:hover {
    background: rgba(15,40,70,0.65);
    border-color: rgba(100,180,255,0.25);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(60,150,240,0.12);
  }
  .btn:active { transform: translateY(0); }
  .btn .icon { font-size: 16px; }
  #notification {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(8,20,40,0.65);
    -webkit-backdrop-filter: blur(14px);
    backdrop-filter: blur(14px);
    border-radius: 14px;
    border: 1px solid rgba(100,180,255,0.1);
    padding: 14px 24px;
    color: rgba(210,235,255,0.92);
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
    text-align: center;
  }
  #notification.show { opacity: 1; }
  #zoomHint {
    position: absolute;
    bottom: 56px; right: 14px;
    color: rgba(130,180,220,0.3);
    font-size: 10px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="canvas"></canvas>
  <div id="ui">
    <div id="topBar">
      <div class="status-panel">
        <div><span class="label">水質</span></div>
        <div class="water-bar"><div class="water-bar-fill" id="waterBar"></div></div>
      </div>
      <div class="status-panel" id="shrimpInfo">
        <div><span class="label">赤白ビー：</span><span class="value" id="beeStatus">ツマツマ中</span></div>
        <div><span class="label">透明エビ：</span><span class="value" id="clearStatus">水草の影</span></div>
      </div>
    </div>
    <div id="bottomBar">
      <button class="btn" id="feedBtn"><span class="icon">🍤</span>餌をあげる</button>
      <button class="btn" id="cleanBtn"><span class="icon">💧</span>水換え</button>
      <button class="btn" id="zoomInBtn"><span class="icon">🔍</span>近づく</button>
      <button class="btn" id="zoomOutBtn"><span class="icon">🔭</span>離れる</button>
    </div>
    <div id="notification"></div>
    <div id="zoomHint">ホイール:ズーム ／ ドラッグ:移動</div>
  </div>
</div>

<script>
// ============================================================
//  癒し水槽ゲーム ― 海老育成アプリ  (Realistic Edition)
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 960, H = 640;
canvas.width = W; canvas.height = H;

let time = 0, lastTime = performance.now();
const camera = { x: 0, y: 0, zoom: 1, targetZoom: 1, targetX: 0, targetY: 0 };
let waterQuality = 100;

// ─── Helpers ───
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
function rand(a,b){return a+Math.random()*(b-a)}
function randInt(a,b){return Math.floor(rand(a,b+1))}
function hsl(h,s,l,a){return a!==undefined?`hsla(${h},${s}%,${l}%,${a})`:`hsl(${h},${s}%,${l}%)`}

function notify(msg, dur=2800){
  const el=document.getElementById('notification');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
}

// ============================================================
//  PROCEDURAL NOISE (simple Perlin-like)
// ============================================================
const _perm=[];for(let i=0;i<512;i++)_perm[i]=(Math.random()*256)|0;
function noise2d(x,y){
  const X=Math.floor(x)&255,Y=Math.floor(y)&255;
  const xf=x-Math.floor(x),yf=y-Math.floor(y);
  const u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);
  const aa=_perm[(_perm[X]+Y)&511],ab=_perm[(_perm[X]+Y+1)&511];
  const ba=_perm[(_perm[X+1]+Y)&511],bb=_perm[(_perm[X+1]+Y+1)&511];
  const n=lerp(lerp(aa,ba,u),lerp(ab,bb,u),v)/255;
  return n;
}

// ============================================================
//  BACKGROUND — realistic depth gradient
// ============================================================
function drawBackground(ctx){
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#9cd4e8');
  bg.addColorStop(0.06,'#7cc4de');
  bg.addColorStop(0.15,'#5aadce');
  bg.addColorStop(0.35,'#3d92b8');
  bg.addColorStop(0.55,'#2d7a9e');
  bg.addColorStop(0.75,'#1f6280');
  bg.addColorStop(1,'#163e55');
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,W,H);

  // Depth haze layers
  for(let i=0;i<6;i++){
    const y=H*0.4+i*40;
    ctx.globalAlpha=0.015+i*0.006;
    ctx.fillStyle='#0d2a3d';
    ctx.fillRect(0,y,W,35);
  }
  ctx.globalAlpha=1;

  // Back wall texture (very subtle)
  ctx.globalAlpha=0.03;
  for(let y=0;y<H;y+=3){
    for(let x=0;x<W;x+=3){
      const n=noise2d(x*0.03,y*0.03+time*0.01);
      if(n>0.52){
        ctx.fillStyle='#fff';
        ctx.fillRect(x,y,2,2);
      }
    }
  }
  ctx.globalAlpha=1;
}

// ============================================================
//  WATER SURFACE — realistic ripple
// ============================================================
function drawWaterSurface(ctx,t){
  ctx.save();
  for(let layer=0;layer<3;layer++){
    const alpha=[0.18,0.12,0.08][layer];
    const freq=[0.018,0.028,0.045][layer];
    const amp=[5,3,1.5][layer];
    const speed=[0.6,0.9,1.4][layer];
    ctx.strokeStyle=`rgba(220,245,255,${alpha})`;
    ctx.lineWidth=[2.5,1.5,1][layer];
    ctx.beginPath();
    for(let x=0;x<=W;x+=2){
      const y=44+Math.sin(x*freq+t*speed)*amp
        +Math.sin(x*freq*1.7+t*speed*0.6)*amp*0.5
        +layer*2;
      if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }

  // Surface meniscus
  const menGrad=ctx.createLinearGradient(0,38,0,52);
  menGrad.addColorStop(0,'rgba(220,245,255,0.35)');
  menGrad.addColorStop(1,'rgba(220,245,255,0)');
  ctx.fillStyle=menGrad;
  ctx.fillRect(0,38,W,14);

  // Volumetric light rays
  ctx.globalCompositeOperation='screen';
  for(let i=0;i<7;i++){
    const rx=80+i*135+Math.sin(t*0.15+i*2.1)*25;
    const spread=40+Math.sin(t*0.2+i*1.3)*12;
    const a=0.025+Math.sin(t*0.18+i*0.9)*0.012;
    const grad=ctx.createLinearGradient(rx,45,rx+spread*0.3,H*0.75);
    grad.addColorStop(0,`rgba(180,230,255,${a*2})`);
    grad.addColorStop(0.3,`rgba(160,220,250,${a})`);
    grad.addColorStop(1,'rgba(160,220,250,0)');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.moveTo(rx-8,45);ctx.lineTo(rx+8,45);
    ctx.lineTo(rx+spread,H*0.75);ctx.lineTo(rx-spread*0.7,H*0.75);
    ctx.closePath();ctx.fill();
  }
  ctx.globalCompositeOperation='source-over';
  ctx.restore();
}

// ============================================================
//  CAUSTICS — animated light patterns on sand
// ============================================================
function drawCaustics(ctx,t){
  ctx.save();
  ctx.globalCompositeOperation='screen';
  for(let i=0;i<18;i++){
    const baseX=(i%6)*170+40;
    const baseY=480+Math.floor(i/6)*30;
    const cx=baseX+Math.sin(t*0.3+i*1.7)*35+Math.cos(t*0.2+i*2.3)*20;
    const cy=baseY+Math.cos(t*0.25+i*1.1)*15;
    const rx=30+Math.sin(t*0.35+i)*12;
    const ry=18+Math.cos(t*0.4+i*0.8)*8;
    const a=0.04+Math.sin(t*0.3+i*1.5)*0.02;
    const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,rx);
    grad.addColorStop(0,`rgba(180,240,255,${a*1.8})`);
    grad.addColorStop(0.5,`rgba(160,230,255,${a})`);
    grad.addColorStop(1,'rgba(160,230,255,0)');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.ellipse(cx,cy,rx,ry,Math.sin(t*0.15+i)*0.3,0,Math.PI*2);
    ctx.fill();
  }
  ctx.strokeStyle='rgba(180,240,255,0.035)';
  ctx.lineWidth=1.5;
  for(let i=0;i<12;i++){
    const x1=i*85+Math.sin(t*0.25+i)*30;
    const y1=510+Math.cos(t*0.3+i*1.2)*15;
    const x2=x1+60+Math.sin(t*0.2+i*2)*25;
    const y2=530+Math.sin(t*0.35+i*0.8)*12;
    ctx.beginPath();ctx.moveTo(x1,y1);
    ctx.quadraticCurveTo((x1+x2)/2,y1-10+Math.sin(t*0.4+i)*8,x2,y2);
    ctx.stroke();
  }
  ctx.restore();
}

// ============================================================
//  SAND — realistic with layering
// ============================================================
const sandGrains=[];
for(let i=0;i<300;i++){
  sandGrains.push({
    x:rand(0,W),y:rand(548,H),
    r:rand(0.5,2.5),
    color:`rgba(${randInt(170,210)},${randInt(160,195)},${randInt(140,175)},${rand(0.06,0.18)})`,
  });
}
const pebbles=[];
for(let i=0;i<12;i++){
  pebbles.push({
    x:rand(30,W-30),y:rand(552,580),
    rx:rand(3,9),ry:rand(2,5),
    rot:rand(-0.3,0.3),
    color:hsl(randInt(25,45),randInt(10,25),randInt(50,68),rand(0.15,0.35)),
    highlight:rand(0.05,0.15),
  });
}

function drawSand(ctx,t){
  const sandGrad=ctx.createLinearGradient(0,542,0,H);
  sandGrad.addColorStop(0,'#ece2d0');
  sandGrad.addColorStop(0.15,'#e4d8c6');
  sandGrad.addColorStop(0.5,'#d8ccb8');
  sandGrad.addColorStop(1,'#c8bca8');
  ctx.fillStyle=sandGrad;
  ctx.beginPath();ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=1){
    const y=548+Math.sin(x*0.012+0.5)*5+Math.sin(x*0.035+1.2)*2.5+Math.sin(x*0.08)*1;
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W,H);ctx.closePath();ctx.fill();

  ctx.fillStyle='rgba(190,178,158,0.2)';
  ctx.beginPath();ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=1){
    const y=560+Math.sin(x*0.015+2)*3+Math.sin(x*0.04)*1.5;
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W,H);ctx.closePath();ctx.fill();

  for(const g of sandGrains){
    ctx.fillStyle=g.color;
    ctx.beginPath();ctx.arc(g.x,g.y,g.r,0,Math.PI*2);ctx.fill();
  }

  for(const p of pebbles){
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.ellipse(0,0,p.rx,p.ry,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(255,255,255,${p.highlight})`;
    ctx.beginPath();ctx.ellipse(-p.rx*0.2,-p.ry*0.3,p.rx*0.5,p.ry*0.4,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  ctx.strokeStyle='rgba(180,170,150,0.06)';ctx.lineWidth=1;
  for(let i=0;i<8;i++){
    const y=555+i*5;
    ctx.beginPath();
    for(let x=0;x<=W;x+=2){
      const yy=y+Math.sin(x*0.04+i*0.8)*1.5;
      if(x===0)ctx.moveTo(x,yy);else ctx.lineTo(x,yy);
    }
    ctx.stroke();
  }
}

// ============================================================
//  WATER PLANTS — realistic moss & stems
// ============================================================
class WaterPlant{
  constructor(x,y,type,bladeCount){
    this.x=x;this.y=y;this.type=type;
    this.blades=[];
    for(let i=0;i<bladeCount;i++){
      this.blades.push({
        angle:rand(-0.35,0.35),
        length:type==='moss'?rand(18,50):rand(40,90),
        width:type==='moss'?rand(1.5,4):rand(2.5,6),
        phase:rand(0,Math.PI*2),
        speed:rand(0.2,0.5),
        hue:type==='moss'?randInt(115,148):randInt(100,135),
        sat:randInt(40,70),
        light:randInt(28,50),
        offsetX:rand(-15,15),
        tipCurl:rand(0.1,0.4)*(Math.random()<0.5?1:-1),
        segments:type==='stem'?randInt(3,5):1,
      });
    }
  }
  draw(ctx,t){
    for(const b of this.blades){
      const sway=Math.sin(t*b.speed+b.phase)*0.06+Math.sin(t*b.speed*1.7+b.phase+1)*0.03;
      const bx=this.x+b.offsetX;
      const by=this.y;
      ctx.save();ctx.translate(bx,by);ctx.rotate(b.angle+sway);

      if(this.type==='moss'){
        const grad=ctx.createLinearGradient(0,0,0,-b.length);
        grad.addColorStop(0,hsl(b.hue,b.sat,b.light+5,0.9));
        grad.addColorStop(0.7,hsl(b.hue+5,b.sat+5,b.light+10,0.85));
        grad.addColorStop(1,hsl(b.hue+8,b.sat,b.light+15,0.7));
        ctx.fillStyle=grad;
        ctx.beginPath();ctx.moveTo(0,0);
        ctx.bezierCurveTo(-b.width,-b.length*0.3,-b.width*0.8+b.tipCurl*5,-b.length*0.7,b.tipCurl*3,-b.length);
        ctx.bezierCurveTo(b.width*0.8+b.tipCurl*5,-b.length*0.7,b.width,-b.length*0.3,0,0);
        ctx.fill();
        ctx.strokeStyle=hsl(b.hue-5,b.sat-10,b.light-5,0.15);
        ctx.lineWidth=0.5;
        ctx.beginPath();ctx.moveTo(0,0);
        ctx.quadraticCurveTo(b.tipCurl*2,-b.length*0.5,b.tipCurl*3,-b.length);
        ctx.stroke();
      }else{
        ctx.strokeStyle=hsl(b.hue,b.sat,b.light,0.8);
        ctx.lineWidth=b.width*0.4;
        let cx=0,cy=0;
        const segH=b.length/b.segments;
        for(let s=0;s<b.segments;s++){
          const nx=cx+rand(-3,3)+b.tipCurl*2;
          const ny=cy-segH;
          ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(nx,ny);ctx.stroke();
          if(s>0){
            const leafLen=rand(8,16);
            const leafDir=s%2===0?1:-1;
            const leafSway=Math.sin(t*b.speed*0.8+s)*0.1;
            ctx.save();ctx.translate(cx,cy);ctx.rotate(leafDir*0.8+leafSway);
            const lg=ctx.createLinearGradient(0,0,leafLen,0);
            lg.addColorStop(0,hsl(b.hue,b.sat,b.light,0.8));
            lg.addColorStop(1,hsl(b.hue+10,b.sat,b.light+15,0.5));
            ctx.fillStyle=lg;
            ctx.beginPath();ctx.ellipse(leafLen/2,0,leafLen/2,3,0,0,Math.PI*2);ctx.fill();
            ctx.restore();
          }
          cx=nx;cy=ny;
        }
      }
      ctx.restore();
    }
  }
}

const plants=[];
const bgPlants=[
  {x:60,y:550,type:'moss',n:22},{x:140,y:548,type:'stem',n:6},
  {x:220,y:552,type:'moss',n:15},{x:350,y:548,type:'moss',n:18},
  {x:430,y:545,type:'stem',n:8},{x:520,y:550,type:'moss',n:20},
  {x:600,y:548,type:'stem',n:5},{x:680,y:552,type:'moss',n:16},
  {x:760,y:548,type:'moss',n:12},{x:840,y:550,type:'stem',n:7},
  {x:900,y:548,type:'moss',n:10},{x:180,y:553,type:'moss',n:8},
  {x:480,y:555,type:'moss',n:6},{x:720,y:553,type:'moss',n:7},
];
for(const p of bgPlants)plants.push(new WaterPlant(p.x,p.y,p.type,p.n));

// ============================================================
//  FLOATING PARTICLES (detritus / microorganisms)
// ============================================================
const particles=[];
for(let i=0;i<50;i++){
  particles.push({
    x:rand(0,W),y:rand(60,540),
    vx:rand(-2,2),vy:rand(-1,1),
    r:rand(0.3,1.5),
    alpha:rand(0.04,0.15),
    phase:rand(0,Math.PI*2),
  });
}
function updateParticles(dt){
  for(const p of particles){
    p.x+=p.vx*dt+Math.sin(time*0.5+p.phase)*0.3*dt;
    p.y+=p.vy*dt+Math.cos(time*0.4+p.phase)*0.2*dt;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;
    if(p.y<50)p.y=540;if(p.y>545)p.y=50;
  }
}
function drawParticles(ctx){
  for(const p of particles){
    ctx.globalAlpha=p.alpha;
    ctx.fillStyle='rgba(220,240,250,1)';
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ============================================================
//  BUBBLES — realistic
// ============================================================
const bubbles=[];
function spawnBubble(x,y){
  bubbles.push({
    x:x||rand(50,W-50),y:y||H-rand(20,80),
    r:rand(1,4.5),speed:rand(18,40),
    wobble:rand(0,Math.PI*2),wobbleAmp:rand(4,12),
    alpha:rand(0.12,0.3),born:time,
  });
}
setInterval(()=>{if(Math.random()<0.35)spawnBubble()},1800);
for(let i=0;i<5;i++)spawnBubble(rand(100,W-100),rand(200,500));

function drawBubbles(ctx,t){
  for(let i=bubbles.length-1;i>=0;i--){
    const b=bubbles[i];
    b.y-=b.speed*(1/60);
    b.x+=Math.sin(t*1.2+b.wobble)*b.wobbleAmp*(1/60);
    if(b.y<46){bubbles.splice(i,1);continue;}
    ctx.save();
    ctx.globalAlpha=b.alpha;
    ctx.strokeStyle='rgba(200,240,255,0.5)';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.stroke();
    const bg=ctx.createRadialGradient(b.x-b.r*0.3,b.y-b.r*0.3,0,b.x,b.y,b.r);
    bg.addColorStop(0,'rgba(220,250,255,0.12)');bg.addColorStop(1,'rgba(200,240,255,0.02)');
    ctx.fillStyle=bg;ctx.fill();
    ctx.globalAlpha=b.alpha*1.5;
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.beginPath();ctx.arc(b.x-b.r*0.3,b.y-b.r*0.35,b.r*0.25,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=b.alpha*0.5;
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.beginPath();ctx.arc(b.x+b.r*0.15,b.y+b.r*0.25,b.r*0.15,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

const foods=[];
class Food{
  constructor(x){
    this.x=x;this.y=55;this.targetY=rand(490,535);
    this.speed=rand(12,22);this.size=rand(1.8,3.5);
    this.eaten=false;this.sway=rand(0,Math.PI*2);
    this.alpha=1;this.rot=rand(0,Math.PI*2);
  }
  update(dt){
    if(this.eaten){this.alpha-=dt*2.5;return}
    if(this.y<this.targetY){
      this.y+=this.speed*dt;
      this.x+=Math.sin(time*1.2+this.sway)*6*dt;
      this.rot+=dt*0.8;
    }
  }
  draw(ctx){
    if(this.alpha<=0)return;
    ctx.save();ctx.globalAlpha=this.alpha;
    ctx.translate(this.x,this.y);ctx.rotate(this.rot);
    ctx.fillStyle='#b8884a';
    ctx.beginPath();ctx.ellipse(0,0,this.size*1.2,this.size*0.8,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(200,160,100,0.5)';
    ctx.beginPath();ctx.ellipse(-this.size*0.2,-this.size*0.2,this.size*0.4,this.size*0.3,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  get settled(){return this.y>=this.targetY-2}
}

const shells=[];
class MoltedShell{
  constructor(x,y,isRed){
    this.x=x;this.y=y;this.alpha=0.6;
    this.floatSpeed=rand(2,6);this.size=rand(5,9);
    this.isRed=isRed;this.rot=rand(0,Math.PI*2);
    this.rotSpeed=rand(-0.2,0.2);
  }
  update(dt){
    this.y-=this.floatSpeed*dt;
    this.x+=Math.sin(time*0.6+this.rot)*2*dt;
    this.rot+=this.rotSpeed*dt;
    this.alpha-=dt*0.04;
  }
  draw(ctx){
    if(this.alpha<=0)return;
    ctx.save();ctx.globalAlpha=this.alpha*0.5;
    ctx.translate(this.x,this.y);ctx.rotate(this.rot);
    ctx.fillStyle=this.isRed?'rgba(200,160,150,0.4)':'rgba(220,230,225,0.3)';
    ctx.beginPath();ctx.ellipse(0,0,this.size,this.size*0.4,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=0.5;ctx.stroke();
    ctx.restore();
  }
}

// ============================================================
//  SHRIMP BASE
// ============================================================
const ST={TSUMA:0,WALK:1,IDLE:2,SWIM:3,EAT:4,FOLLOW:5};
const SN_BEE=['ツマツマ中','歩き中','休憩中','スイム！','お食事中',''];
const SN_CLR=['ツマツマ中','歩き中','水草の影','スイム','お食事中','ついていく'];

class Shrimp{
  constructor(x,y){
    this.x=x;this.y=y;this.targetX=x;this.targetY=y;
    this.state=ST.TSUMA;this.stateTimer=0;this.stateDuration=rand(3,8);
    this.facing=1;this.legPhase=0;this.bodyWave=0;
    this.transparency=0;this.moltTimer=rand(60,120);
    this.speed=20;this.antPhase=rand(0,Math.PI*2);
    this.tsumaPhase=0;this.jawMoving=false;
    this.swimBurst=0;this.breathPhase=rand(0,Math.PI*2);
  }
  pickWalkTarget(){
    this.targetX=clamp(this.x+rand(-130,130),60,W-60);
    this.targetY=clamp(rand(480,545),475,550);
  }
  update(dt){
    this.stateTimer+=dt;
    this.legPhase+=dt*(this.state===ST.WALK?8:this.state===ST.SWIM?14:5);
    this.bodyWave+=dt*2;this.antPhase+=dt*2.5;
    this.tsumaPhase+=dt*14;this.breathPhase+=dt*1.5;
    this.moltTimer-=dt;
    if(this.swimBurst>0)this.swimBurst-=dt*3;
    if(this.moltTimer<=0){this.molt();this.moltTimer=rand(90,180);}
    if(this.stateTimer>=this.stateDuration)this.pickNewState();

    switch(this.state){
      case ST.TSUMA:
        this.jawMoving=true;
        this.y+=Math.sin(time*1.8+this.breathPhase)*0.08;
        break;
      case ST.WALK:{
        this.jawMoving=false;
        const dx=this.targetX-this.x,dy=this.targetY-this.y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d>3){this.facing=dx>0?1:-1;this.x+=(dx/d)*this.speed*dt;this.y+=(dy/d)*this.speed*0.4*dt;}
        else this.stateTimer=this.stateDuration;
        break;
      }
      case ST.IDLE:
        this.jawMoving=false;this.y+=Math.sin(time*1.2+this.breathPhase)*0.05;
        break;
      case ST.SWIM:{
        this.jawMoving=false;this.swimBurst=1;
        const dx=this.targetX-this.x,dy=this.targetY-this.y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d>5){this.facing=dx>0?1:-1;this.x+=(dx/d)*this.speed*3.5*dt;this.y+=(dy/d)*this.speed*2.5*dt;}
        else this.stateTimer=this.stateDuration;
        break;
      }
      case ST.EAT:{
        this.jawMoving=true;
        let near=null,minD=Infinity;
        for(const f of foods){if(f.eaten||!f.settled)continue;const fd=Math.abs(f.x-this.x)+Math.abs(f.y-this.y);if(fd<minD){minD=fd;near=f;}}
        if(near){const dx=near.x-this.x,dy=near.y-this.y;const d=Math.sqrt(dx*dx+dy*dy);
          if(d>7){this.facing=dx>0?1:-1;this.x+=(dx/d)*this.speed*dt;this.y+=(dy/d)*this.speed*0.4*dt;}
          else near.eaten=true;
        }else{this.state=ST.TSUMA;this.stateTimer=0;this.stateDuration=rand(3,6);}
        break;
      }
      case ST.FOLLOW:this.jawMoving=false;break;
    }
    this.x=clamp(this.x,30,W-30);this.y=clamp(this.y,400,555);
  }
  molt(){
    shells.push(new MoltedShell(this.x,this.y-4,this instanceof BeeShrimp));
    this.transparency=Math.min(this.transparency+0.06,0.25);
    notify('🦐 脱皮しました！ 殻がふわりと浮いていきます…');
  }

  // ── Realistic shadow ──
  drawShadow(ctx,bodyW){
    ctx.save();ctx.globalAlpha=0.08;
    ctx.fillStyle='rgba(0,15,30,1)';
    ctx.beginPath();ctx.ellipse(-2,16,bodyW*0.55,3,Math.sin(time*0.4)*0.02,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // ── Realistic antennae: 2 long + 2 short antennules ──
  drawAntennae(ctx,bx,by,sc,am){
    const a=am||1;
    const s1=Math.sin(this.antPhase*0.6),s2=Math.sin(this.antPhase*0.5+1.2),s3=Math.sin(this.antPhase*0.7+0.5);
    // Long antenna 1 (upper, sweeps far forward and up)
    ctx.lineWidth=0.4;ctx.strokeStyle='rgba(150,130,110,'+(0.28*a).toFixed(2)+')';
    ctx.beginPath();ctx.moveTo(bx,by);
    ctx.bezierCurveTo(bx+14*sc,by-10*sc+s1*3,bx+28*sc,by-18*sc+s1*6,bx+40*sc+s1*4,by-22*sc+s1*8);
    ctx.stroke();
    // Long antenna 2 (lower)
    ctx.strokeStyle='rgba(150,130,110,'+(0.22*a).toFixed(2)+')';
    ctx.beginPath();ctx.moveTo(bx,by+1);
    ctx.bezierCurveTo(bx+12*sc,by-4*sc+s2*3,bx+24*sc,by-6*sc+s2*5,bx+36*sc+s2*3,by-12*sc+s2*7);
    ctx.stroke();
    // Antennule 1 (shorter, slightly thicker)
    ctx.lineWidth=0.6;ctx.strokeStyle='rgba(150,130,110,'+(0.30*a).toFixed(2)+')';
    ctx.beginPath();ctx.moveTo(bx-1,by+2);
    ctx.bezierCurveTo(bx+5*sc,by+3*sc+s3*2,bx+9*sc,by+1*sc+s3*3,bx+14*sc+s3*2,by+4*sc+s3*4);
    ctx.stroke();
    // Antennule 2
    ctx.lineWidth=0.5;ctx.strokeStyle='rgba(150,130,110,'+(0.22*a).toFixed(2)+')';
    ctx.beginPath();ctx.moveTo(bx-1,by+3);
    ctx.bezierCurveTo(bx+4*sc,by+5*sc+s3*2,bx+7*sc,by+4*sc+s3*2,bx+12*sc+s3*1.5,by+7*sc+s3*3);
    ctx.stroke();
  }
}

// ============================================================
//  BEE SHRIMP — anatomically realistic side-view
// ============================================================
class BeeShrimp extends Shrimp{
  constructor(){super(rand(300,550),rand(495,530));this.speed=17;}
  pickNewState(){
    const r=Math.random();
    if(foods.some(f=>!f.eaten&&f.settled)){this.state=ST.EAT;this.stateDuration=rand(5,10);}
    else if(r<0.70){this.state=ST.TSUMA;this.stateDuration=rand(5,12);}
    else if(r<0.90){this.state=ST.WALK;this.pickWalkTarget();this.stateDuration=rand(3,8);}
    else if(r<0.98){this.state=ST.IDLE;this.stateDuration=rand(2,6);}
    else{this.state=ST.SWIM;this.targetX=clamp(this.x+rand(-220,220),80,W-80);this.targetY=rand(420,500);this.stateDuration=rand(1,2);}
    this.stateTimer=0;
    document.getElementById('beeStatus').textContent=SN_BEE[this.state];
  }

  draw(ctx){
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.scale(this.facing,1);
    if(this.transparency>0) ctx.globalAlpha=1-this.transparency*0.3;

    const w=this.bodyWave;
    const br=Math.sin(this.breathPhase)*0.3;
    const tOff=this.jawMoving?Math.sin(this.tsumaPhase)*0.6:0;

    // Animated vertical offsets for natural body undulation
    const ay=(t)=>Math.sin(w+t*2.5)*0.5*(1-t)+br*t;
    const a0=ay(0),a1=ay(0.12),a2=ay(0.25),a3=ay(0.38),a4=ay(0.50),a5=ay(0.62),a6=ay(0.75),a7=ay(0.88),a8=ay(1.0);

    // ── Helper: trace anatomical body outline using bezier curves ──
    // Dorsal contour arches up (carapace dome), ventral is flatter
    // Body length ~48px, height ~16px at widest (carapace)
    const bodyPath=()=>{
      ctx.beginPath();
      // Start at tail base (dorsal side)
      ctx.moveTo(-22,2+a0);
      // === DORSAL CONTOUR (tail → head, curving upward) ===
      // Abdomen: 6 segments gradually rising
      ctx.bezierCurveTo(-20,0.5+a0,-18,-1+a1,-16,-2.5+a1);
      ctx.bezierCurveTo(-14,-3.8+a2,-12,-5+a2,-10,-5.8+a3);
      ctx.bezierCurveTo(-8,-6.5+a3,-5,-7.2+a3,-2,-7.8+a4);
      ctx.bezierCurveTo(0,-8.2+a4,2,-8.5+a5,4,-8.8+a5);
      // Carapace: smooth dome (highest point of body)
      ctx.bezierCurveTo(6,-9.2+a5,9,-9.5+a6,12,-9.2+a6);
      ctx.bezierCurveTo(14,-8.8+a7,16,-7.8+a7,18,-6+a7);
      // Head: tapers forward
      ctx.bezierCurveTo(19,-5+a8,20,-4+a8,21,-3+a8);
      // Head front edge
      ctx.lineTo(21,2+a8);
      // === VENTRAL CONTOUR (head → tail, flatter) ===
      ctx.bezierCurveTo(20,3.5+a8,18,5+a7,16,5.5+a7);
      ctx.bezierCurveTo(14,6+a7,12,6.5+a6,9,7+a6);
      ctx.bezierCurveTo(6,7+a5,3,7+a5,0,6.5+a4);
      ctx.bezierCurveTo(-3,6+a4,-6,5.5+a3,-9,5+a3);
      ctx.bezierCurveTo(-12,4.5+a2,-15,4+a2,-18,3.5+a1);
      ctx.bezierCurveTo(-20,3.2+a1,-21,3+a0,-22,3+a0);
      ctx.closePath();
    };

    // ── Shadow ──
    this.drawShadow(ctx,48);

    // ── TAIL FAN (telson + 2 pairs of uropods) ──
    const tBx=-22,tBy=2.5+a0;
    const flick=this.swimBurst>0?Math.sin(time*18)*3:0;
    // Upper uropod
    ctx.fillStyle='rgba(190,55,45,0.55)';
    ctx.beginPath();
    ctx.moveTo(tBx,tBy-1);
    ctx.quadraticCurveTo(tBx-7,tBy-5+flick*0.3,tBx-13,tBy-3+flick*0.5);
    ctx.quadraticCurveTo(tBx-8,tBy-0.5,tBx,tBy);
    ctx.fill();
    // Telson (central paddle)
    ctx.fillStyle='rgba(195,60,50,0.65)';
    ctx.beginPath();
    ctx.moveTo(tBx,tBy-0.5);
    ctx.quadraticCurveTo(tBx-9,tBy,tBx-14,tBy+0.5);
    ctx.quadraticCurveTo(tBx-9,tBy+1.5,tBx,tBy+1);
    ctx.fill();
    // Lower uropod
    ctx.fillStyle='rgba(190,55,45,0.5)';
    ctx.beginPath();
    ctx.moveTo(tBx,tBy+0.5);
    ctx.quadraticCurveTo(tBx-7,tBy+5-flick*0.3,tBx-12,tBy+5-flick*0.5);
    ctx.quadraticCurveTo(tBx-7,tBy+3,tBx,tBy+1.5);
    ctx.fill();
    // Tail fan setae (fine hairs at edge)
    ctx.strokeStyle='rgba(200,180,160,0.1)';ctx.lineWidth=0.3;
    for(let i=0;i<5;i++){
      const ang=-0.6+i*0.3;
      ctx.beginPath();
      ctx.moveTo(tBx-11+Math.abs(i-2),tBy+Math.sin(ang)*3);
      ctx.lineTo(tBx-15+Math.abs(i-2)*0.5,tBy+Math.sin(ang)*5.5);
      ctx.stroke();
    }

    // ── BODY: base red fill ──
    bodyPath();
    ctx.fillStyle='#c43333';
    ctx.fill();

    // ── WHITE BANDS (clipped to body shape) ──
    ctx.save();
    bodyPath();
    ctx.clip();
    // Crystal Red Bee pattern: alternating red/white bands
    const bands=[[-23,-16],[-9,-3],[3,9],[17,22]];
    for(const[x1,x2]of bands){
      ctx.fillStyle='#ede5d8';
      ctx.fillRect(x1,-14,x2-x1,28);
    }
    // Dorsal highlight (3D shading over entire body)
    const hlG=ctx.createLinearGradient(0,-10,0,8);
    hlG.addColorStop(0,'rgba(255,230,220,0.25)');
    hlG.addColorStop(0.35,'rgba(255,200,180,0.08)');
    hlG.addColorStop(0.7,'rgba(0,0,0,0)');
    hlG.addColorStop(1,'rgba(0,0,0,0.1)');
    ctx.fillStyle=hlG;
    ctx.fillRect(-24,-14,50,28);
    ctx.restore();

    // ── Subtle body outline ──
    bodyPath();
    ctx.strokeStyle='rgba(140,30,25,0.12)';
    ctx.lineWidth=0.6;
    ctx.stroke();

    // ── ABDOMEN SEGMENT LINES ──
    ctx.strokeStyle='rgba(0,0,0,0.07)';ctx.lineWidth=0.5;
    const segXs=[-18,-14,-10,-6,-2,2];
    for(const sx of segXs){
      const t=(sx+22)/44;
      const aOff=ay(t);
      const topY=lerp(0,-8.5,Math.min(t*1.3,1))+aOff;
      const botY=lerp(3.5,7,Math.min(t*1.1,1))+aOff;
      ctx.beginPath();ctx.moveTo(sx,topY);ctx.lineTo(sx+0.3,botY);ctx.stroke();
    }
    // Carapace-abdomen division (more prominent)
    ctx.strokeStyle='rgba(0,0,0,0.09)';ctx.lineWidth=0.6;
    ctx.beginPath();ctx.moveTo(5,-8.8+a5);ctx.lineTo(5.3,7+a5);ctx.stroke();

    // ── PLEOPODS (5 pairs of swimming legs under abdomen) ──
    ctx.lineWidth=0.5;
    for(let i=0;i<5;i++){
      const lx=-16+i*4.5;
      const t=(lx+22)/44;
      const aOff=ay(t);
      const baseY=lerp(3.5,6.5,Math.min(t*1.1,1))+aOff;
      const swing=Math.sin(this.legPhase+i*1.1)*2;
      ctx.strokeStyle='rgba(200,120,100,0.25)';
      ctx.beginPath();ctx.moveTo(lx,baseY);
      ctx.quadraticCurveTo(lx+swing*0.5,baseY+3,lx+swing,baseY+5.5);
      ctx.stroke();
      // Feathery setae at tip
      ctx.strokeStyle='rgba(200,140,120,0.12)';
      ctx.beginPath();ctx.moveTo(lx+swing,baseY+5.5);ctx.lineTo(lx+swing+0.8,baseY+6.5);ctx.stroke();
      ctx.beginPath();ctx.moveTo(lx+swing,baseY+5.5);ctx.lineTo(lx+swing-0.8,baseY+6.5);ctx.stroke();
    }

    // ── PEREIOPODS (5 pairs of walking legs under carapace) ──
    ctx.strokeStyle='rgba(200,140,120,0.4)';ctx.lineWidth=0.6;
    for(let i=0;i<5;i++){
      const lx=7+i*2.8;
      const aOff=ay(0.65+i*0.05);
      const baseY=6+aOff;
      const swing=Math.sin(this.legPhase*1.2+i*1.3)*2;
      ctx.beginPath();ctx.moveTo(lx,baseY);
      const kneeY=baseY+4;
      ctx.lineTo(lx+swing*0.3,kneeY);
      ctx.lineTo(lx+swing,kneeY+3.5);
      ctx.stroke();
    }

    // ── ROSTRUM (sharp forward projection) ──
    ctx.fillStyle='#c43333';
    ctx.beginPath();
    ctx.moveTo(21,-3.5+a8);
    ctx.lineTo(26+tOff,-5+a8);
    ctx.lineTo(21,-2+a8);
    ctx.closePath();ctx.fill();

    // ── EYE (small, proportional — on short stalk) ──
    const eyeX=19.5,eyeY=-4.5+a8;
    // Eyestalk
    ctx.fillStyle='rgba(160,60,50,0.4)';
    ctx.beginPath();ctx.ellipse(eyeX,eyeY+1.2,1.2,1.8,0.15,0,Math.PI*2);ctx.fill();
    // Eye globe (small, realistic)
    ctx.fillStyle='#1a1a1a';
    ctx.beginPath();ctx.arc(eyeX+0.3,eyeY,1.5,0,Math.PI*2);ctx.fill();
    // Tiny specular highlight
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.beginPath();ctx.arc(eyeX+0.8,eyeY-0.5,0.45,0,Math.PI*2);ctx.fill();

    // ── ANTENNAE ──
    this.drawAntennae(ctx,22,-3+a8,1);

    // ── MAXILLIPEDS / TSUMATUMA CLAWS ──
    if(this.jawMoving){
      const co=Math.sin(this.tsumaPhase)*1.8;
      ctx.strokeStyle='rgba(200,130,110,0.5)';ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(20,0.5+a8);ctx.lineTo(23+tOff,-1-co+a8);ctx.stroke();
      ctx.beginPath();ctx.moveTo(20,1.5+a8);ctx.lineTo(23+tOff,3+co+a8);ctx.stroke();
      ctx.fillStyle='rgba(200,130,110,0.4)';
      ctx.beginPath();ctx.arc(23+tOff,-1-co+a8,0.7,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(23+tOff,3+co+a8,0.7,0,Math.PI*2);ctx.fill();
    }

    // ── ENVIRONMENT LIGHT REFLECTION ──
    ctx.globalCompositeOperation='screen';
    ctx.globalAlpha=0.04+Math.sin(time*0.5)*0.015;
    const envG=ctx.createLinearGradient(-24,0,22,0);
    envG.addColorStop(0,'rgba(150,220,255,0)');
    envG.addColorStop(0.4,'rgba(150,220,255,1)');
    envG.addColorStop(0.7,'rgba(150,220,255,0.5)');
    envG.addColorStop(1,'rgba(150,220,255,0)');
    ctx.fillStyle=envG;
    ctx.fillRect(-24,-11,48,5);
    ctx.globalCompositeOperation='source-over';
    ctx.globalAlpha=1;ctx.restore();
  }
}

// ============================================================
//  CLEAR SHRIMP — anatomically realistic transparent
// ============================================================
class ClearShrimp extends Shrimp{
  constructor(){super(rand(600,800),rand(505,540));this.speed=14;this.baseAlpha=0.42;}
  pickNewState(){
    const r=Math.random();
    if(foods.some(f=>!f.eaten&&f.settled)){
      if(Math.random()<0.55){this.state=ST.EAT;this.stateDuration=rand(5,10);}
      else{this.state=ST.TSUMA;this.stateDuration=rand(3,6);}
    }else if(r<0.55){this.state=ST.TSUMA;this.stateDuration=rand(5,14);}
    else if(r<0.75){
      this.state=ST.WALK;
      const p=plants[randInt(0,plants.length-1)];
      this.targetX=p.x+rand(-25,25);this.targetY=clamp(p.y-rand(5,18),485,550);
      this.stateDuration=rand(3,7);
    }else if(r<0.88){this.state=ST.IDLE;this.stateDuration=rand(3,9);}
    else if(r<0.95){this.state=ST.FOLLOW;this.stateDuration=rand(4,8);}
    else{this.state=ST.SWIM;this.targetX=clamp(this.x+rand(-150,150),80,W-80);this.targetY=rand(440,510);this.stateDuration=rand(1,2);}
    this.stateTimer=0;
    document.getElementById('clearStatus').textContent=SN_CLR[this.state];
  }
  update(dt){
    super.update(dt);
    if(this.state===ST.FOLLOW&&beeShrimp){
      const dx=beeShrimp.x-35*this.facing-this.x,dy=beeShrimp.y-this.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d>25){this.facing=dx>0?1:-1;this.x+=(dx/d)*this.speed*0.7*dt;this.y+=(dy/d)*this.speed*0.25*dt;}
    }
  }

  draw(ctx){
    const sc=0.82;
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.scale(this.facing*sc,sc);
    const alpha=this.baseAlpha-this.transparency*0.15;
    ctx.globalAlpha=alpha;

    const w=this.bodyWave;
    const br=Math.sin(this.breathPhase)*0.3;
    const tOff=this.jawMoving?Math.sin(this.tsumaPhase)*0.5:0;
    const ay=(t)=>Math.sin(w+t*2.5)*0.4*(1-t)+br*t;
    const a0=ay(0),a1=ay(0.12),a2=ay(0.25),a3=ay(0.38),a4=ay(0.50),a5=ay(0.62),a6=ay(0.75),a7=ay(0.88),a8=ay(1.0);

    // ── Body path (same anatomical shape as bee shrimp) ──
    const bodyPath=()=>{
      ctx.beginPath();
      ctx.moveTo(-22,2+a0);
      ctx.bezierCurveTo(-20,0.5+a0,-18,-1+a1,-16,-2.5+a1);
      ctx.bezierCurveTo(-14,-3.8+a2,-12,-5+a2,-10,-5.8+a3);
      ctx.bezierCurveTo(-8,-6.5+a3,-5,-7.2+a3,-2,-7.8+a4);
      ctx.bezierCurveTo(0,-8.2+a4,2,-8.5+a5,4,-8.8+a5);
      ctx.bezierCurveTo(6,-9.2+a5,9,-9.5+a6,12,-9.2+a6);
      ctx.bezierCurveTo(14,-8.8+a7,16,-7.8+a7,18,-6+a7);
      ctx.bezierCurveTo(19,-5+a8,20,-4+a8,21,-3+a8);
      ctx.lineTo(21,2+a8);
      ctx.bezierCurveTo(20,3.5+a8,18,5+a7,16,5.5+a7);
      ctx.bezierCurveTo(14,6+a7,12,6.5+a6,9,7+a6);
      ctx.bezierCurveTo(6,7+a5,3,7+a5,0,6.5+a4);
      ctx.bezierCurveTo(-3,6+a4,-6,5.5+a3,-9,5+a3);
      ctx.bezierCurveTo(-12,4.5+a2,-15,4+a2,-18,3.5+a1);
      ctx.bezierCurveTo(-20,3.2+a1,-21,3+a0,-22,3+a0);
      ctx.closePath();
    };

    // ── Shadow ──
    this.drawShadow(ctx,44);
    ctx.globalAlpha=alpha;

    // ── TAIL FAN (transparent version) ──
    const tBx=-22,tBy=2.5+a0;
    const flick=this.swimBurst>0?Math.sin(time*18)*2:0;
    ctx.fillStyle='rgba(180,210,195,0.25)';
    ctx.beginPath();
    ctx.moveTo(tBx,tBy-1);
    ctx.quadraticCurveTo(tBx-6,tBy-4+flick*0.3,tBx-11,tBy-2.5+flick*0.4);
    ctx.quadraticCurveTo(tBx-7,tBy-0.5,tBx,tBy);
    ctx.fill();
    ctx.fillStyle='rgba(185,215,200,0.3)';
    ctx.beginPath();
    ctx.moveTo(tBx,tBy-0.5);
    ctx.quadraticCurveTo(tBx-8,tBy,tBx-12,tBy+0.5);
    ctx.quadraticCurveTo(tBx-8,tBy+1,tBx,tBy+0.8);
    ctx.fill();
    ctx.fillStyle='rgba(180,210,195,0.2)';
    ctx.beginPath();
    ctx.moveTo(tBx,tBy+0.5);
    ctx.quadraticCurveTo(tBx-6,tBy+4-flick*0.3,tBx-10,tBy+4-flick*0.4);
    ctx.quadraticCurveTo(tBx-6,tBy+2.5,tBx,tBy+1.2);
    ctx.fill();

    // ── BODY: semi-transparent fill ──
    bodyPath();
    const bodyGrad=ctx.createRadialGradient(0,-2,0,0,0,22);
    bodyGrad.addColorStop(0,'rgba(200,220,210,0.35)');
    bodyGrad.addColorStop(0.6,'rgba(190,215,205,0.22)');
    bodyGrad.addColorStop(1,'rgba(175,200,190,0.12)');
    ctx.fillStyle=bodyGrad;
    ctx.fill();

    // ── Body outline ──
    bodyPath();
    ctx.strokeStyle='rgba(160,185,175,0.18)';
    ctx.lineWidth=0.5;
    ctx.stroke();

    // ── Internal organs (visible through transparent body) ──
    ctx.save();
    bodyPath();
    ctx.clip();
    // Hepatopancreas (digestive gland — orange mass)
    ctx.fillStyle='rgba(210,170,100,'+(0.1+Math.sin(time*0.8)*0.02).toFixed(3)+')';
    ctx.beginPath();ctx.ellipse(5,-1+a5,5,3,0.1,0,Math.PI*2);ctx.fill();
    // Gut line
    ctx.strokeStyle='rgba(200,170,120,0.06)';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(-18,1+a1);
    ctx.bezierCurveTo(-10,0.5+a3,0,0+a4,12,0.5+a7);
    ctx.stroke();
    // Dorsal highlight
    const hlG=ctx.createLinearGradient(0,-10,0,8);
    hlG.addColorStop(0,'rgba(255,255,255,0.12)');
    hlG.addColorStop(0.4,'rgba(0,0,0,0)');
    hlG.addColorStop(1,'rgba(0,0,0,0.05)');
    ctx.fillStyle=hlG;
    ctx.fillRect(-24,-14,50,28);
    ctx.restore();

    // ── SEGMENT LINES ──
    ctx.strokeStyle='rgba(0,0,0,0.04)';ctx.lineWidth=0.4;
    const segXs=[-18,-14,-10,-6,-2,2,5];
    for(const sx of segXs){
      const t=(sx+22)/44;
      const aOff=ay(t);
      const topY=lerp(0,-8.5,Math.min(t*1.3,1))+aOff;
      const botY=lerp(3.5,7,Math.min(t*1.1,1))+aOff;
      ctx.beginPath();ctx.moveTo(sx,topY);ctx.lineTo(sx,botY);ctx.stroke();
    }

    // ── PLEOPODS ──
    ctx.strokeStyle='rgba(170,195,185,0.18)';ctx.lineWidth=0.4;
    for(let i=0;i<5;i++){
      const lx=-16+i*4.5;const t=(lx+22)/44;const aOff=ay(t);
      const baseY=lerp(3.5,6.5,Math.min(t*1.1,1))+aOff;
      const swing=Math.sin(this.legPhase+i*1.1)*1.5;
      ctx.beginPath();ctx.moveTo(lx,baseY);ctx.lineTo(lx+swing,baseY+4.5);ctx.stroke();
    }

    // ── PEREIOPODS ──
    ctx.strokeStyle='rgba(170,195,185,0.28)';ctx.lineWidth=0.5;
    for(let i=0;i<4;i++){
      const lx=7+i*3;const aOff=ay(0.65+i*0.06);
      const baseY=6+aOff;const swing=Math.sin(this.legPhase*1.2+i*1.3)*1.5;
      ctx.beginPath();ctx.moveTo(lx,baseY);ctx.lineTo(lx+swing*0.3,baseY+3.5);ctx.lineTo(lx+swing,baseY+6);ctx.stroke();
    }

    // ── ROSTRUM ──
    ctx.fillStyle='rgba(185,210,200,0.25)';
    ctx.beginPath();
    ctx.moveTo(21,-3.5+a8);ctx.lineTo(25,-4.5+a8);ctx.lineTo(21,-2+a8);
    ctx.closePath();ctx.fill();

    // ── EYE (proportionally small) ──
    const eyeX=19.5,eyeY=-4.5+a8;
    ctx.globalAlpha=0.75;
    ctx.fillStyle='#222';
    ctx.beginPath();ctx.arc(eyeX+0.3,eyeY,1.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.beginPath();ctx.arc(eyeX+0.7,eyeY-0.4,0.35,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=alpha;

    // ── ANTENNAE ──
    ctx.globalAlpha=alpha*0.7;
    this.drawAntennae(ctx,22,-3+a8,0.85,0.7);
    ctx.globalAlpha=alpha;

    // ── TSUMATUMA ──
    if(this.jawMoving){
      const co=Math.sin(this.tsumaPhase)*1.2;
      ctx.strokeStyle='rgba(170,195,185,0.3)';ctx.lineWidth=0.6;
      ctx.beginPath();ctx.moveTo(20,0.5+a8);ctx.lineTo(22+tOff,-0.5-co+a8);ctx.stroke();
      ctx.beginPath();ctx.moveTo(20,1.5+a8);ctx.lineTo(22+tOff,2+co+a8);ctx.stroke();
    }

    // ── ENVIRONMENT REFLECTION ──
    ctx.globalCompositeOperation='screen';
    ctx.globalAlpha=0.025;
    ctx.fillStyle='rgba(150,220,255,1)';
    ctx.fillRect(-24,-10,48,4);
    ctx.globalCompositeOperation='source-over';
    ctx.globalAlpha=1;ctx.restore();
  }
}

// ============================================================
//  CREATE SHRIMPS
// ============================================================
const beeShrimp=new BeeShrimp();
const clearShrimp=new ClearShrimp();
beeShrimp.pickNewState();clearShrimp.pickNewState();

// ============================================================
//  GLASS EFFECT
// ============================================================
function drawGlass(ctx){
  ctx.save();
  const vl=ctx.createLinearGradient(0,0,40,0);
  vl.addColorStop(0,'rgba(0,10,20,0.2)');vl.addColorStop(1,'rgba(0,10,20,0)');
  ctx.fillStyle=vl;ctx.fillRect(0,0,40,H);
  const vr=ctx.createLinearGradient(W,0,W-40,0);
  vr.addColorStop(0,'rgba(0,10,20,0.2)');vr.addColorStop(1,'rgba(0,10,20,0)');
  ctx.fillStyle=vr;ctx.fillRect(W-40,0,40,H);
  const vt=ctx.createLinearGradient(0,0,0,25);
  vt.addColorStop(0,'rgba(0,10,20,0.15)');vt.addColorStop(1,'rgba(0,10,20,0)');
  ctx.fillStyle=vt;ctx.fillRect(0,0,W,25);
  const vb=ctx.createLinearGradient(0,H,0,H-30);
  vb.addColorStop(0,'rgba(0,10,20,0.2)');vb.addColorStop(1,'rgba(0,10,20,0)');
  ctx.fillStyle=vb;ctx.fillRect(0,H-30,W,30);
  ctx.globalAlpha=0.04;ctx.fillStyle='rgba(200,240,255,1)';
  ctx.fillRect(18,30,2,H-60);
  ctx.globalAlpha=0.025;ctx.fillRect(24,50,1,H-100);
  ctx.globalAlpha=0.03;ctx.fillRect(W-20,40,1.5,H-80);
  ctx.globalAlpha=1;ctx.restore();
}

// ============================================================
//  MAIN LOOP
// ============================================================
function render(now){
  const dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;time+=dt;

  waterQuality=Math.max(0,waterQuality-dt*0.025);
  document.getElementById('waterBar').style.width=waterQuality+'%';

  beeShrimp.update(dt);clearShrimp.update(dt);
  updateParticles(dt);

  for(const f of foods)f.update(dt);
  for(let i=foods.length-1;i>=0;i--)if(foods[i].alpha<=0)foods.splice(i,1);
  for(const s of shells)s.update(dt);
  for(let i=shells.length-1;i>=0;i--)if(shells[i].alpha<=0)shells.splice(i,1);

  camera.zoom=lerp(camera.zoom,camera.targetZoom,dt*2.5);
  camera.x=lerp(camera.x,camera.targetX,dt*2.5);
  camera.y=lerp(camera.y,camera.targetY,dt*2.5);

  ctx.save();
  ctx.translate(W/2,H/2);ctx.scale(camera.zoom,camera.zoom);ctx.translate(-W/2+camera.x,-H/2+camera.y);

  drawBackground(ctx);drawWaterSurface(ctx,time);drawCaustics(ctx,time);drawSand(ctx,time);

  for(let i=0;i<plants.length;i+=2)plants[i].draw(ctx,time);
  drawParticles(ctx);
  for(const f of foods)f.draw(ctx);
  for(const s of shells)s.draw(ctx);

  clearShrimp.draw(ctx);beeShrimp.draw(ctx);

  for(let i=1;i<plants.length;i+=2)plants[i].draw(ctx,time);
  drawBubbles(ctx,time);drawGlass(ctx);

  ctx.restore();
  requestAnimationFrame(render);
}

// ============================================================
//  INPUT
// ============================================================
document.getElementById('feedBtn').addEventListener('click',()=>{
  for(let i=0;i<randInt(3,5);i++)foods.push(new Food(rand(180,W-180)));
  notify('🍤 餌を落としました');
  setTimeout(()=>{beeShrimp.state=ST.EAT;beeShrimp.stateTimer=0;beeShrimp.stateDuration=rand(6,12);document.getElementById('beeStatus').textContent=SN_BEE[ST.EAT];},600);
  setTimeout(()=>{clearShrimp.state=ST.EAT;clearShrimp.stateTimer=0;clearShrimp.stateDuration=rand(6,12);document.getElementById('clearStatus').textContent=SN_CLR[ST.EAT];},2200);
});
document.getElementById('cleanBtn').addEventListener('click',()=>{
  waterQuality=Math.min(100,waterQuality+30);
  notify('💧 水を換えました。水質が改善しました');
  for(let i=0;i<8;i++)setTimeout(()=>spawnBubble(rand(100,W-100),rand(400,550)),i*150);
});
document.getElementById('zoomInBtn').addEventListener('click',()=>{camera.targetZoom=Math.min(2.8,camera.targetZoom+0.3);});
document.getElementById('zoomOutBtn').addEventListener('click',()=>{camera.targetZoom=Math.max(0.6,camera.targetZoom-0.3);});

canvas.addEventListener('wheel',(e)=>{e.preventDefault();const d=e.deltaY>0?-0.08:0.08;camera.targetZoom=clamp(camera.targetZoom+d,0.6,2.8);},{passive:false});

let dragging=false,dragSX=0,dragSY=0;
canvas.addEventListener('mousedown',(e)=>{dragging=true;dragSX=e.clientX;dragSY=e.clientY;});
window.addEventListener('mousemove',(e)=>{
  if(!dragging)return;
  const dx=(e.clientX-dragSX)/camera.zoom,dy=(e.clientY-dragSY)/camera.zoom;
  camera.targetX=clamp(camera.targetX+dx,-250,250);camera.targetY=clamp(camera.targetY+dy,-120,120);
  dragSX=e.clientX;dragSY=e.clientY;
});
window.addEventListener('mouseup',()=>{dragging=false;});

// ============================================================
//  START
// ============================================================
notify('🌊 癒し水槽へようこそ。静かな時間をお過ごしください。',4000);
requestAnimationFrame(render);
</script>
